// Override a single week's time / link
// Pick a week, then open the one-off time change for it. Lives on the
// Consultations tab so per-week changes don't require the Attendance register.
function weekPickThenOverride(c,done){
  const sem=activeSemester(); const weeks=sem?.weeks||12; const cw=currentWeekOf(sem);
  const sel=el("select",{});
  for(let w=1;w<=weeks;w++){
    const range=weekRangeLabel(sem,w);
    const ov=weekTime(c,w).overridden;
    sel.append(el("option",{value:String(w),...((cw?w===cw:w===1)?{selected:"selected"}:{})},
      "Week "+w+(range?" \u00B7 "+range:"")+(w===cw?" \u00B7 this week":"")+(ov?" \u00B7 changed":"")));
  }
  modal("Change the time for one week",
    el("div",{class:"grid"},
      el("p",{class:"muted",style:"margin:0"},
        "Pick the week, then set a one-off day/time/link for it. The recurring time stays unchanged for every other week, and the student sees the change."),
      el("div",{},el("label",{},"Week"),sel)),
    async()=>{ const w=parseInt(sel.value); setTimeout(()=>weekOverrideForm(c,w,done),50); return true; },
    "Next");
}

function weekOverrideForm(c,w,done){
  const cur=(c.weeks?.[w]) || (c.weeks?.[String(w)]) || {};
  const useDefault=el("input",{type:"checkbox",style:"width:auto",...(!(cur.day||cur.start||cur.end||cur.mode||cur.link)?{checked:"checked"}:{})});
  const day=el("select",{},...DAYS.map(d=>el("option",{value:d,...(d===(cur.day||c.day)?{selected:"selected"}:{})},d)));
  const start=el("input",{type:"time",value:cur.start||c.start});
  const end=el("input",{type:"time",value:cur.end||c.end});
  const mode=el("select",{},...["Online","In person","Hybrid"].map(m=>el("option",{value:m,...(m===(cur.mode||c.mode)?{selected:"selected"}:{})},m)));
  const link=el("input",{value:cur.link||"",placeholder:"Leave blank to use the recurring link"});

  const wkRange=weekRangeLabel(activeSemester(),w);
  modal("Week "+w+(wkRange?" ("+wkRange+")":"")+" — change time",
    el("div",{class:"grid"},
      el("label",{class:"ui",style:"display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-weight:500;color:var(--ink)"},
        useDefault," Use the recurring time for this week (no change)"),
      el("div",{class:"grid",style:"grid-template-columns:1fr 1fr"},
        el("div",{style:"grid-column:1/-1"},el("label",{},"Day"),day),
        el("div",{},el("label",{},"Start"),start),
        el("div",{},el("label",{},"End"),end),
        el("div",{style:"grid-column:1/-1"},el("label",{},"Mode"),mode),
        el("div",{style:"grid-column:1/-1"},el("label",{},"Meeting link for this week"),link))),
    async()=>{
      const key=String(w);
      const keep=(c.weeks?.[key]) || (c.weeks?.[w]) || {};
      // preserve the logging fields (held / attendance / comment), only change overrides
      const logged={held:keep.held,studentAttended:keep.studentAttended,coAttended:keep.coAttended,comment:keep.comment};
      let weekData;
      if(useDefault.checked){
        weekData={...logged}; // strip overrides — back to recurring time
      } else {
        if(start.value>=end.value){ toast("End must be after start.",true); return false; }
        weekData={...logged, day:day.value,start:start.value,end:end.value,mode:mode.value,link:link.value.trim()};
      }
      // clean undefined keys
      Object.keys(weekData).forEach(k=>weekData[k]===undefined&&delete weekData[k]);
      try{
        await DB.updateWeek(c.id, key, weekData);
      }catch(err){
        console.error("week override save failed",err);
        toast("Couldn't save this week's time — "+(err?.code||err?.message||"please try again."),true);
        return false; // keep the modal open so the entry isn't lost
      }
      if(!c.weeks) c.weeks={};
      c.weeks[key]=weekData; // local copy fresh so re-render shows the new time
      toast("Week "+w+" updated."); done(); return true;
    });
}



/* ============================================================
   9b. BULK EMAIL TO STUDENTS (supervisor)
   Opens the supervisor's own mail app (via mailto:) with their
   students' addresses pre-loaded into BCC, plus a subject/body the
   supervisor can edit. Scope can be narrowed to just the students
   they are principal supervisor for, just the ones they co-supervise,
   or everyone. BCC keeps each student's address private from the
   others. Nothing is sent from the app itself — the supervisor taps
   "send" in their mail client.
   ============================================================ */
async function bulkEmailStudents(){
  if(S.role!=="supervisor"){ toast("Bulk email is for supervisors.",true); return; }
  const all=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});
  const mine=all.filter(s=>s.principalUid===S.uid||s.coUid===S.uid);
  if(!mine.length){ toast("You have no students in this semester.",true); return; }

  const principalCount=mine.filter(s=>s.principalUid===S.uid).length;
  const coCount=mine.filter(s=>s.coUid===S.uid && s.principalUid!==S.uid).length;

  // scope picker
  const scope=el("select",{},
    el("option",{value:"all"},`All my students (${mine.length})`),
    el("option",{value:"principal"},`Students I am principal supervisor for (${principalCount})`),
    el("option",{value:"co"},`Students I co-supervise (${coCount})`));
  const subject=el("input",{value:"MRes supervision — "+(activeSemester()?.label||"this semester")});
  const body=el("textarea",{placeholder:"Dear all,\n\nA quick note for everyone I supervise this semester…",style:"min-height:120px"});
  const note=el("p",{class:"muted",style:"margin:0"});
  const preview=el("p",{class:"muted",style:"margin:2px 0 0;font-size:13px"});

  function selected(){
    const m=scope.value;
    let list = m==="principal" ? mine.filter(s=>s.principalUid===S.uid)
             : m==="co"        ? mine.filter(s=>s.coUid===S.uid && s.principalUid!==S.uid)
             :                   mine;
    // unique by sid, only those with an email on file
    const seen=new Set();
    return list.filter(s=>{ if(!s.email) return false; if(seen.has(s.sid)) return false; seen.add(s.sid); return true; });
  }
  function refresh(){
    const recips=selected();
    const noEmail=( scope.value==="principal" ? mine.filter(s=>s.principalUid===S.uid)
                  : scope.value==="co"        ? mine.filter(s=>s.coUid===S.uid && s.principalUid!==S.uid)
                  :                             mine ).filter(s=>!s.email).length;
    note.textContent = recips.length
      ? `${recips.length} recipient${recips.length===1?"":"s"} will be added to BCC (each address hidden from the others).`
      : "No students with an email on file in this group.";
    preview.textContent = recips.length
      ? "To: "+recips.map(s=>s.name||s.email).slice(0,6).join(", ")+(recips.length>6?` +${recips.length-6} more`:"")
        + (noEmail?`  ·  ${noEmail} skipped (no email).`:"")
      : "";
  }
  scope.onchange=refresh; refresh();

  modal("Email all my students",
    el("div",{class:"grid"},
      el("div",{},el("label",{},"Who to email"),scope),
      el("div",{},el("label",{},"Subject"),subject),
      el("div",{},el("label",{},"Message"),body),
      note, preview,
      el("p",{class:"muted",style:"margin:0"},
        "This opens your device's mail app with the addresses in BCC and the text pre-filled. Review and tap send there — the hub does not send email itself.")),
    async()=>{
      const recips=selected();
      if(!recips.length){ toast("No students with an email to send to.",true); return false; }
      const emails=recips.map(s=>s.email);
      // mailto with BCC; put the supervisor's own address (if known) as the visible "to"
      const me=S.supervisors.find(u=>u.id===S.uid);
      const to=me?.email||"";
      const url="mailto:"+encodeURIComponent(to)
        +"?bcc="+encodeURIComponent(emails.join(","))
        +"&subject="+encodeURIComponent(subject.value||"")
        +"&body="+encodeURIComponent(body.value||"");
      window.location.href=url;
      toast(`Opening mail app with ${recips.length} recipient${recips.length===1?"":"s"} in BCC.`);
      return true;
    },"Open mail app");
}

/* ============================================================
   9b. MESSAGES TAB — supervision notes
   One thread per student, shared by the principal supervisor, the
   co-supervisor, the admin office and the student. Unread notes are
   flagged; opening a thread marks them read for this user only.
   ============================================================ */
async function viewNotes(v){
  v.innerHTML="";
  v.append(el("div",{class:"section-title"},el("div",{},
    el("div",{class:"eyebrow ui"},"Shared supervision thread"),
    el("h2",{},"Messages"))));
  const bar=el("div",{class:"toolbar"}); bar.append(semesterPicker(()=>viewNotes(v)));
  v.append(bar);
  v.append(el("p",{class:"muted ui",style:"margin-top:-6px"},
    "One message board per student, shared by the principal supervisor, the co-supervisor and the student — everyone sees the same thread, so nothing gets lost in separate email chains. New messages are flagged here and on the tab, and are shown to each person when they next sign in. Students read and reply in their own portal."));

  const students=await myNoteStudents();
  if(!students.length){
    // Distinguish "no students at all" from "none in THIS semester" or
    // "none allocated to me" — otherwise the tab looks broken.
    const allInSem=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});
    const sem=activeSemester();
    if(S.role==="supervisor" && allInSem.length){
      v.append(emptyState("No students allocated to you in "+(sem?.label||"this semester"),
        "There are "+allInSem.length+" student(s) in this semester, but none list you as principal or co-supervisor. Pick another semester above, or ask the admin office to check the allocation on the Students tab."));
    } else if(allInSem.length===0 && sem){
      v.append(emptyState("No students in "+sem.label,
        "Message threads are created per student. Choose a semester that has students, or add them on the Students tab."));
    } else {
      v.append(emptyState("No students yet",
        S.role==="supervisor"?"Threads appear for students you principal- or co-supervise.":"Add students first."));
    }
    return;
  }
  let notes;
  try{
    notes=await loadNotes(S.activeSem,students.map(s=>s.id));
  }catch(err){
    v.append(notesRuleHelp(err));
    return;
  }
  const meId=noteMeId();

  // Unread first, then most recently active.
  const meta=students.map(s=>{
    const thread=notes.filter(n=>n.studentDocId===s.id);
    return {s,thread,unread:thread.filter(n=>isUnread(n,meId)).length,
            last:thread[0]?.createdAt||0};
  }).sort((a,b)=>(b.unread-a.unread)||(b.last-a.last));

  const totalUnread=meta.reduce((t,m)=>t+m.unread,0);
  if(totalUnread){
    v.append(el("div",{class:"row",style:"margin:2px 0 12px;gap:10px;align-items:center;flex-wrap:wrap"},
      el("span",{class:"pill blue"},totalUnread+" unread"),
      el("button",{class:"btn ghost sm",onclick:async()=>{
        await markNotesRead(notes); toast("All messages marked as read."); refreshUnreadBadge(); viewNotes(v);
      }},"Mark all as read")));
  }

  const list=el("div",{class:"grid",style:"gap:14px"});
  for(const m of meta){
    const s=m.s;
    const myRole=noteMyRole(s);
    const card=el("div",{class:"card"});
    const head=el("div",{class:"row",style:"align-items:center;gap:8px;flex-wrap:wrap"},
      el("strong",{},s.name), areaPill(s.area),
      el("span",{class:"pill "+rolePillClass(myRole),style:"font-size:11.5px"},"You: "+roleLabel(myRole)));
    if(m.unread) head.append(el("span",{class:"pill missed",style:"font-size:11.5px"},m.unread+" new"));
    head.append(el("span",{style:"flex:1;min-width:8px"}),
      el("span",{class:"muted ui",style:"font-size:12.5px"},
        m.thread.length?m.thread.length+" message"+(m.thread.length===1?"":"s")+" \u00B7 "+relTime(m.last):"No messages yet"));
    card.append(head);
    card.append(el("div",{class:"muted ui",style:"font-size:12.5px;margin:3px 0 10px"},
      "Principal: "+(s.principalName||"\u2014")+(s.coName?" \u00B7 Co: "+s.coName:" \u00B7 No co-supervisor")+
      (s.email?" \u00B7 "+s.email:"")));

    // --- thread (pinned first, then newest) ---
    const body=el("div",{style:"display:flex;flex-direction:column;gap:8px"});
    const ordered=[...m.thread].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.createdAt||0)-(a.createdAt||0));
    if(!ordered.length){
      body.append(el("p",{class:"muted",style:"margin:0"},"No messages yet — start the conversation below."));
    }
    ordered.slice(0,6).forEach(n=>{
      const unread=isUnread(n,meId);
      const row=el("div",{style:"border:1px solid var(--line);border-radius:10px;padding:10px 12px"
        +(unread?";border-left:3px solid var(--blue)":"")+(n.pinned?";background:rgba(127,127,127,.06)":"")});
      const top=el("div",{class:"row",style:"align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px"},
        el("strong",{class:"ui",style:"font-size:13.5px"},n.authorName||"Unknown"),
        el("span",{class:"pill "+rolePillClass(n.authorRole),style:"font-size:11px"},roleLabel(n.authorRole)),
        el("span",{class:"muted ui",style:"font-size:12px"},relTime(n.createdAt)));
      if(n.pinned) top.append(el("span",{class:"pill pending",style:"font-size:11px"},"\u2691 Pinned"));
      if(unread) top.append(el("span",{class:"pill missed",style:"font-size:11px"},"New"));
      row.append(top, el("div",{style:"white-space:pre-wrap;font-size:14px"},n.text||""));
      // author (or admin) can pin / unpin and delete
      if(n.authorUid===meId || S.role==="admin"){
        row.append(el("div",{class:"row",style:"gap:6px;margin-top:7px"},
          el("button",{class:"btn xs ghost",onclick:async()=>{
            await DB.update("notes",n.id,{pinned:!n.pinned}); viewNotes(v);
          }},n.pinned?"Unpin":"\u2691 Pin"),
          el("button",{class:"btn xs ghost",onclick:async()=>{
            await DB.remove("notes",n.id); toast("Message deleted."); refreshUnreadBadge(); viewNotes(v);
          }},"Delete")));
      }
      body.append(row);
    });
    if(ordered.length>6) body.append(el("p",{class:"muted ui",style:"margin:0;font-size:12.5px"},
      "Showing the 6 most recent of "+ordered.length+" messages."));
    card.append(body);

    // --- composer ---
    const ta=el("textarea",{placeholder:"Write a message to "+
      (myRole==="student"?"your supervisors":"the other supervisor and the student")+"\u2026",
      style:"min-height:70px;margin-top:10px"});
    const pin=el("input",{type:"checkbox"});
    const actions=el("div",{class:"row",style:"gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap"});
    actions.append(el("label",{class:"ui",style:"display:flex;align-items:center;gap:6px;font-size:13px;margin:0"},
      pin,"Pin to top of thread"));
    actions.append(el("span",{style:"flex:1;min-width:8px"}));
    if(m.unread) actions.append(el("button",{class:"btn ghost sm",onclick:async()=>{
      await markNotesRead(m.thread); refreshUnreadBadge(); viewNotes(v);
    }},"Mark thread read"));
    actions.append(el("button",{class:"btn sm",onclick:async()=>{
      if(await postNote(s,ta.value,pin.checked)){
        ta.value=""; toast("Message posted."); refreshUnreadBadge(); viewNotes(v);
      }
    }},"Post message"));
    card.append(ta,actions);
    card.append(el("p",{class:"muted ui",style:"margin:8px 0 0;font-size:12.5px"},
      "Visible to "+(s.principalName||"the principal supervisor")+
      (s.coName?", "+s.coName:"")+", "+s.name+" and the admin office."));
    list.append(card);
  }
  v.append(list);

  // opening the tab marks nothing automatically — the user decides — but we
  // refresh the badge so it reflects any reads done above
  refreshUnreadBadge();
}

/* Shown when the `notes` collection can't be read — almost always a missing
   Firestore security rule, since the collection is new. Gives the exact rule
   to paste rather than leaving a blank tab. */
function notesRuleHelp(err){
  const card=el("div",{class:"card",style:"border-left:4px solid var(--clay,#c2410c)"});
  card.append(
    el("h3",{style:"margin:0 0 6px"},"Messages can't be loaded"),
    el("p",{class:"muted",style:"margin:0 0 10px"},
      "The app couldn't read the \u201Cnotes\u201D collection. Firestore reported: "+
      (err?.message||"unknown error")),
    el("p",{style:"margin:0 0 8px;font-size:14px"},
      "Messages are stored in a new collection called notes. If your Firestore security rules only list the older collections, every read and write here is denied and the tab comes back empty. Add a rule for notes in the Firebase console under Firestore Database \u2192 Rules, then reload:"));
  const rule=
"match /notes/{noteId} {\n"+
"  allow read, create: if request.auth != null;\n"+
"  allow update, delete: if request.auth != null;\n"+
"}";
  const pre=el("pre",{style:"white-space:pre-wrap;background:rgba(127,127,127,.1);padding:12px;border-radius:8px;font-size:12.5px;margin:0 0 10px"},rule);
  card.append(pre,
    el("div",{class:"row",style:"gap:8px;flex-wrap:wrap"},
      el("button",{class:"btn sm",onclick:()=>{
        navigator.clipboard?.writeText(rule).then(()=>toast("Rule copied."),()=>toast("Copy failed \u2014 select the text manually.",true));
      }},"Copy rule"),
      el("button",{class:"btn ghost sm",onclick:()=>drawMain()},"Retry")),
    el("p",{class:"muted ui",style:"margin:10px 0 0;font-size:12.5px"},
      "The rule above lets any signed-in user read and write messages, which matches how the rest of this app is secured. Students use the ID-lookup portal rather than a login, so if you want them to post you also need public access to notes \u2014 tighten it later once the roles are settled."));
  return card;
}

/* ============================================================
   10. SUMMARY REPORT (admin) — oversight + CSV
   Shows, per principal supervisor and per student, whether the
   consultation is arranged, how many meetings held, and attendance.
   ============================================================ */
async function viewReport(v){
  v.innerHTML="";
  const sem=activeSemester();
  const weeks=sem?.weeks||12;
  v.append(el("div",{class:"section-title"},el("div",{},
    el("div",{class:"eyebrow ui"},"Oversight · "+(sem?.label||""),),
    el("h2",{},"Supervision summary"))));

  // ---- Toolbar: semester + supervisor focus + role lens ----
  // viewReport keeps its own filter state so it survives re-renders.
  viewReport._sup = viewReport._sup || "all";        // supervisor uid or "all"
  viewReport._lens = viewReport._lens || "any";       // "any" | "principal" | "co"

  const students=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});
  const cons=await DB.list("consultations", S.activeSem?{semesterId:S.activeSem}:{});

  // Supervisor focus dropdown (built from staff who actually supervise here,
  // plus any supervisor on the roster so admin can pick anyone).
  const supSel=el("select",{style:"width:auto;min-width:200px",onchange:e=>{viewReport._sup=e.target.value;viewReport(v);}});
  supSel.append(el("option",{value:"all",...(viewReport._sup==="all"?{selected:"selected"}:{})},"All supervisors"));
  // collect unique supervisors referenced on students + the global supervisor list
  const supMap=new Map();
  S.supervisors.forEach(u=>supMap.set(u.id,u.name||u.email||u.id));
  students.forEach(s=>{ if(s.principalUid)supMap.set(s.principalUid,s.principalName||supMap.get(s.principalUid)||s.principalUid);
                        if(s.coUid)supMap.set(s.coUid,s.coName||supMap.get(s.coUid)||s.coUid); });
  [...supMap.entries()].sort((a,b)=>String(a[1]).localeCompare(String(b[1]))).forEach(([uid,name])=>{
    supSel.append(el("option",{value:uid,...(viewReport._sup===uid?{selected:"selected"}:{})},name));
  });

  const lensSel=el("select",{style:"width:auto;min-width:150px",onchange:e=>{viewReport._lens=e.target.value;viewReport(v);}});
  [["any","As principal or co"],["principal","As principal only"],["co","As co-supervisor only"]].forEach(([val,lab])=>
    lensSel.append(el("option",{value:val,...(viewReport._lens===val?{selected:"selected"}:{})},lab)));

  const bar=el("div",{class:"toolbar"});
  bar.append(semesterPicker(()=>viewReport(v)));
  bar.append(el("div",{class:"field"},el("label",{},"Supervisor focus"),supSel));
  bar.append(el("div",{class:"field"},el("label",{},"Role lens"),
    (viewReport._sup==="all"
      ? el("select",{style:"width:auto;min-width:150px",disabled:"disabled"},el("option",{},"—"))
      : lensSel)));
  v.append(bar);

  if(!students.length){ v.append(emptyState("Nothing to report yet","Add students and meetings first.")); return; }

  // ---- Build the per-student rows for the CURRENT lens ----
  // When a supervisor is focused, a student is included if that supervisor is
  // their principal and/or co (depending on the lens). We also tag which role
  // the focused supervisor plays for that student so the detail view is clear.
  const focus=viewReport._sup;
  const lens=viewReport._lens;
  function matches(s){
    if(focus==="all") return true;
    const isP=s.principalUid===focus, isC=s.coUid===focus;
    if(lens==="principal") return isP;
    if(lens==="co") return isC;
    return isP||isC; // any
  }
  const rows=students.filter(matches).map(s=>{
    // the consultation record always belongs to the principal supervisor
    const c=cons.find(x=>x.studentDocId===s.id && x.supervisorUid===s.principalUid);
    const st=c?consultStats(c,weeks):{held:0,attended:0,missed:0,logged:0};
    const focusRole = focus==="all" ? "" : (s.principalUid===focus?"Principal":(s.coUid===focus?"Co-supervisor":""));
    return {s,c,st,arranged:!!(c&&c.day),focusRole};
  });

  // ---- Headline stats (reflect the current filter) ----
  const arranged=rows.filter(r=>r.arranged).length;
  const noTime=rows.length-arranged;
  const totalHeld=rows.reduce((a,r)=>a+r.st.held,0);
  const totalAttended=rows.reduce((a,r)=>a+r.st.attended,0);
  const totalMissed=rows.reduce((a,r)=>a+r.st.missed,0);

  const focusName = focus==="all" ? null : supMap.get(focus);
  if(focusName){
    v.append(el("p",{class:"muted ui",style:"margin:-4px 0 12px"},
      "Showing "+rows.length+" student"+(rows.length===1?"":"s")+" supervised by "+focusName+
      (lens==="any"?" (as principal or co)":lens==="principal"?" as principal":" as co-supervisor")+"."));
  }

  v.append(el("div",{class:"stat"},
    statBox(String(rows.length),"Students"),
    statBox(String(arranged),"Consultation set"),
    statBox(String(noTime),"No time set"),
    statBox(String(totalHeld),"Meetings held"),
    statBox(String(totalMissed),"Missed"),
    statBox(totalHeld?Math.round(totalAttended/totalHeld*100)+"%":"—","Attendance rate")));

  // ---- Needs attention: automatic early-warning flags ----
  // Low attendance rate, runs of consecutive misses, no consultation time,
  // and (when the semester has a start date) past weeks left unrecorded.
  const cw=currentWeekOf(sem);
  const flaggedRows=rows.map(r=>{
    const flags=[];
    if(!r.arranged) flags.push("No consultation time set");
    if(r.c){
      if(r.st.held>=3 && (r.st.attended/r.st.held)<0.7)
        flags.push("Low attendance ("+Math.round(r.st.attended/r.st.held*100)+"%)");
      let run=0,maxRun=0;
      for(let w=1;w<=weeks;w++){
        const l=weekLog(r.c,w);
        if(l?.held===true && l.studentAttended===false){ run++; maxRun=Math.max(maxRun,run); }
        else if(l?.held===true && l.studentAttended===true) run=0;
      }
      if(maxRun>=2) flags.push(maxRun+" consecutive meetings missed");
      if(cw){
        let unrec=0;
        for(let w=1;w<cw;w++){ const l=weekLog(r.c,w); if(l.held!==true&&l.held!==false) unrec++; }
        if(unrec>=2) flags.push(unrec+" past weeks unrecorded");
      }
    }
    return {...r,flags};
  }).filter(r=>r.flags.length);

  if(flaggedRows.length){
    const fc=el("div",{class:"card",style:"margin-bottom:14px;border-left:4px solid var(--amber)"});
    fc.append(el("div",{class:"row",style:"justify-content:space-between;margin-bottom:8px"},
      el("strong",{class:"ui"},"⚠ Needs attention"),
      el("span",{class:"muted ui"},flaggedRows.length+" student"+(flaggedRows.length===1?"":"s")+" flagged")));
    flaggedRows.forEach(r=>{
      const line=el("div",{class:"row",style:"padding:7px 0;border-top:1px solid var(--line);gap:8px;align-items:center"},
        el("strong",{style:"flex:0 0 auto"},r.s.name),
        el("span",{class:"muted ui",style:"font-size:12.5px"},r.s.principalName?("Principal: "+r.s.principalName):"No principal"),
        el("span",{style:"flex:1"}),
        ...r.flags.map(f=>el("span",{class:"pill "+(f.startsWith("No consultation")?"pending":"missed"),style:"font-size:11.5px"},f)));
      if(r.s.principalUid)
        line.append(emailButton(S.supervisors.find(u=>u.id===r.s.principalUid)?.email,
          "MRes supervision — "+r.s.name,
          "Dear "+(r.s.principalName||"")+",\n\nRegarding "+r.s.name+" ("+(r.s.sid||"")+"): "+r.flags.join("; ")+".\n\n",
          "✉ Principal","btn xs ghost"));
      fc.append(line);
    });
    v.append(fc);
  }

  // ---- Action row: exports + (when focused) contact the supervisor ----
  const actions=el("div",{class:"row",style:"margin-bottom:14px"});
  actions.append(
    el("button",{class:"btn",onclick:()=>downloadReportCSV(rows,sem,weeks)},"Download summary CSV"),
    el("button",{class:"btn blue",onclick:()=>downloadDetailedLogCSV(rows,sem,weeks,focusName,lens)},"Download detailed week-by-week logs"),
    el("button",{class:"btn ghost",onclick:()=>window.print()},"Print / PDF"));
  if(focus!=="all"){
    const focusUser=S.supervisors.find(u=>u.id===focus);
    actions.append(emailButton(focusUser?.email,"MRes supervision — "+(sem?.label||""),
      "Dear "+(focusName||"")+",\n\n","✉ Email "+(focusName||"this supervisor"),"btn amber"));
    // detailed log extraction for this one supervisor (on-screen, all weeks)
    actions.append(el("button",{class:"btn ghost",onclick:()=>showSupervisorDetail(focus,focusName,lens,rows,sem,weeks)},
      "View full log for "+(focusName||"supervisor")));
  }
  v.append(actions);

  // ---- Grouping: by principal when unfocused; flat list when focused ----
  if(focus==="all"){
    const byPrin={};
    rows.forEach(r=>{ const k=r.s.principalName||"Unassigned"; (byPrin[k] ||= []).push(r); });
    Object.keys(byPrin).sort().forEach(prin=>{
      const grp=byPrin[prin];
      const prinUid=grp[0]?.s.principalUid;
      const card=el("div",{class:"card",style:"margin-bottom:14px;padding:0;overflow:hidden"});
      const headRow=el("div",{style:"padding:11px 16px;background:#0000000a;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px"},
        el("strong",{class:"ui"},"Principal: "+prin),
        el("div",{class:"row"},
          el("span",{class:"muted ui"},grp.length+" student"+(grp.length>1?"s":"")),
          ...(prinUid&&prinUid!==S.uid?[emailButton(S.supervisors.find(u=>u.id===prinUid)?.email,"MRes supervision","Dear "+prin+",\n\n","✉ Email","btn xs ghost")]:[]),
          el("button",{class:"btn xs ghost",onclick:()=>{viewReport._sup=prinUid;viewReport._lens="principal";viewReport(v);}},"Focus →")));
      card.append(headRow);
      card.append(buildReportTable(grp,weeks,false,v));
      v.append(card);
    });
  } else {
    const card=el("div",{class:"card",style:"margin-bottom:14px;padding:0;overflow:hidden"});
    card.append(el("div",{style:"padding:11px 16px;background:#0000000a;border-bottom:1px solid var(--line);display:flex;justify-content:space-between"},
      el("strong",{class:"ui"},focusName||"Supervisor"),
      el("span",{class:"muted ui"},rows.length+" student"+(rows.length===1?"":"s"))));
    if(!rows.length){
      card.append(el("p",{class:"muted",style:"padding:20px;margin:0"},"No students match this supervisor and role lens."));
    } else {
      card.append(buildReportTable(rows,weeks,true,v));
    }
    v.append(card);
  }
}

// Shared table builder. showRole adds a "Role" column (which hat the focused
// supervisor wears for that student); every row gets a "Contact" cell with
// quick message buttons to the student and the co-supervisor.
function buildReportTable(group,weeks,showRole,v){
  const headers=["Student","Campus",...(showRole?["Role"]:[]),"Co-supervisor","Time arranged","Held","Attended","Missed","Co present","Last comment","Contact"];
  const t=el("table",{});
  t.append(el("thead",{},el("tr",{},...headers.map(h=>el("th",{},h)))));
  const tb=el("tbody",{});
  group.forEach(({s,c,st,focusRole})=>{
    let coYes=0,coNo=0;
    if(c) for(let w=1;w<=weeks;w++){ const l=weekLog(c,w); if(l?.coAttended==="yes")coYes++; else if(l?.coAttended==="no")coNo++; }
    let lastComment="";
    if(c) for(let w=weeks;w>=1;w--){ const cm=weekLog(c,w)?.comment; if(cm){ lastComment="W"+w+": "+cm; break; } }

    // contact buttons: email handoff only (opens the device's mail app)
    const contact=el("div",{class:"row",style:"gap:5px"});
    contact.append(emailButton(s.email,"MRes supervision — "+s.name,"Dear "+(s.name||"")+",\n\n","✉ Email","btn xs ghost"));
    if(s.coUid && s.coUid!==S.uid){
      contact.append(emailButton(S.supervisors.find(u=>u.id===s.coUid)?.email,
        "MRes supervision — "+s.name,"Dear "+(s.coName||"")+",\n\n","✉ Co","btn xs ghost"));
    }
    if(s.principalUid && s.principalUid!==S.uid){
      contact.append(emailButton(S.supervisors.find(u=>u.id===s.principalUid)?.email,
        "MRes supervision — "+s.name,"Dear "+(s.principalName||"")+",\n\n","✉ Principal","btn xs ghost"));
    }

    const cells=[
      el("td",{},el("strong",{},s.name),el("div",{class:"muted ui",style:"font-size:12px"},s.sid||"")),
      el("td",{},s.campus),
      ...(showRole?[el("td",{}, focusRole?el("span",{class:"pill blue"},focusRole):el("span",{class:"muted"},"—"))]:[]),
      el("td",{},s.coName||"—"),
      el("td",{}, (c&&c.day)?el("span",{class:"pill held"},`${c.day} ${c.start}`)
        : c?el("span",{class:"pill pending"},"Default slot")
        : el("span",{class:"pill missed"},"Not set")),
      el("td",{},String(st.held)),
      el("td",{},String(st.attended)),
      el("td",{},String(st.missed)),
      el("td",{}, c?.coUid?`${coYes}/${coYes+coNo}`:el("span",{class:"muted"},"—")),
      el("td",{class:"muted",style:"max-width:200px;white-space:normal"},lastComment||"—"),
      el("td",{},contact)
    ];
    tb.append(el("tr",{},...cells));
  });
  t.append(tb);
  return t;
}

function downloadReportCSV(rows,sem,weeks){
  const head=["student","sid","campus","principal","co_supervisor","time_arranged","recurring_time","meetings_held","student_attended","student_missed","co_present","attendance_rate"];
  const lines=[head.join(",")];
  rows.forEach(({s,c,st})=>{
    let coYes=0,coTot=0;
    if(c) for(let w=1;w<=weeks;w++){ const l=weekLog(c,w); if(l?.coAttended==="yes"){coYes++;coTot++;} else if(l?.coAttended==="no")coTot++; }
    const rate=st.held?Math.round(st.attended/st.held*100)+"%":"";
    const cell=[
      s.name,s.sid,s.campus,s.principalName||"",s.coName||"",
      (c&&c.day)?"yes":"no", (c&&c.day)?`${c.day} ${c.start}-${c.end}`:"",
      st.held,st.attended,st.missed, c?.coUid?`${coYes}/${coTot}`:"", rate
    ];
    lines.push(cell.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(","));
  });
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const fname=`supervision_report_${(sem?.label||"export").replace(/\s+/g,"_")}.csv`;
  const a=el("a",{href:URL.createObjectURL(blob),download:fname});
  document.body.append(a); a.click(); a.remove(); toast("Report downloaded.");
}

// Detailed extraction: one CSV row per logged week, across the given rows.
// Used for "Download detailed week-by-week logs" and the supervisor modal.
function downloadDetailedLogCSV(rows,sem,weeks,focusName,lens){
  const head=["student","sid","campus","principal","co_supervisor","week",
    "day","start","end","mode","time_overridden",
    "meeting_held","student_attended","co_attended","comment"];
  const lines=[head.join(",")];
  rows.forEach(({s,c})=>{
    if(!c) return;
    for(let w=1;w<=weeks;w++){
      const l=weekLog(c,w); if(!Object.keys(l).length) continue;
      const et=weekTime(c,w);
      const cell=[
        s.name,s.sid,s.campus,s.principalName||"",s.coName||"",
        "W"+w, et.day||"",et.start||"",et.end||"",et.mode||"", et.overridden?"yes":"no",
        l.held===true?"held":l.held===false?"not_held":"",
        l.studentAttended===true?"yes":l.studentAttended===false?"no":"",
        l.coAttended||"",
        (l.comment||"")
      ];
      lines.push(cell.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(","));
    }
  });
  if(lines.length===1) lines.push('"No logged weeks for this selection"');
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const tag=focusName?("_"+focusName.replace(/\s+/g,"_")+(lens&&lens!=="any"?"_"+lens:"")):"";
  const fname=`supervision_detailed${tag}_${(sem?.label||"export").replace(/\s+/g,"_")}.csv`;
  const a=el("a",{href:URL.createObjectURL(blob),download:fname});
  document.body.append(a); a.click(); a.remove(); toast("Detailed logs downloaded.");
}

/* ============================================================
   11b. EMAIL HANDOFF + CONTACTS (admin)
   The app can't send email itself from a static page, so it opens
   the device's own mail app pre-filled via a mailto: link. The user
   taps send. Mobile numbers are stored as a contact record (no SMS
   sending without a backend gateway).
   ============================================================ */
function openEmail(to,subject,body){
  if(!to){ toast("No email on file for this person.",true); return; }
  const url="mailto:"+encodeURIComponent(to)+
    "?subject="+encodeURIComponent(subject||"")+
    "&body="+encodeURIComponent(body||"");
  // location assignment triggers the OS mail handler on web & mobile
  window.location.href=url;
}
// Small reusable "Email" button that opens the mail app.
function emailButton(to,subject,body,label="✉ Email",cls="btn xs ghost"){
  return el("button",{class:cls,title:to?("Email "+to):"No email on file",...(to?{}:{disabled:"disabled"}),
    onclick:()=>openEmail(to,subject,body)},label);
}

/* ---- SMS handoff ------------------------------------------------
   A static page cannot send an SMS by itself — there is no browser
   API for it. What it CAN do is hand the message to the device's own
   messaging app with the number and text pre-filled, using the sms:
   URI scheme. On a phone (iOS/Android) this opens Messages ready to
   send; on a desktop it works only if a messaging app is registered
   (e.g. Phone Link, Messages for Mac), so the button is offered as a
   convenience, not a guarantee. To send SMS automatically, without a
   human tapping send, you need a paid gateway — see the notes in the
   "Send a text" modal.
   ----------------------------------------------------------------- */
function smsHref(number,body){
  const n=String(number||"").replace(/[^\d+]/g,"");
  // iOS wants sms:NUMBER&body=…, Android/others want sms:NUMBER?body=…
  const sep=/iPhone|iPad|iPod|Macintosh/i.test(navigator.userAgent)?"&":"?";
  return "sms:"+n+sep+"body="+encodeURIComponent(body||"");
}
function openSMS(number,body){
  if(!number){ toast("No mobile number on file for this person.",true); return; }
  window.location.href=smsHref(number,body);
}
// Small reusable "Text" button that opens the device's messaging app.
function smsButton(number,body,label="\uD83D\uDCAC Text",cls="btn xs ghost"){
  return el("button",{class:cls,title:number?("Text "+number):"No mobile on file",...(number?{}:{disabled:"disabled"}),
    onclick:()=>openSMS(number,body)},label);
}

        "color:var(--muted,#777)"),

      h("A middle option"),

function semesterForm(existing,done){
  const label=el("input",{placeholder:"e.g. S2 2026",value:existing?.label||""});
  const weeks=el("select",{},
    el("option",{value:"12",...((existing?.weeks||12)===12?{selected:"selected"}:{})},"12 weeks"),
    el("option",{value:"15",...((existing?.weeks)===15?{selected:"selected"}:{})},"15 weeks"));
  const start=el("input",{type:"date",value:existing?.start||""});
  const endd=el("input",{type:"date",value:existing?.end||""});
  const backSel=el("select",{},
    ...[["0","Current week only"],["1","1 week back"],["2","2 weeks back (recommended)"],
        ["3","3 weeks back"],["4","4 weeks back"],["-1","No limit"]]
      .map(([val,txt])=>el("option",{value:val,
        ...((String(existing?.backWeeks??2))===val?{selected:"selected"}:{})},txt)));
  const dateHint=el("div",{class:"muted ui",style:"font-size:12.5px;margin-top:4px"},"");
  function updDateHint(){
    if(start.value&&endd.value){
      const s=new Date(start.value+"T00:00:00"), e=new Date(endd.value+"T00:00:00");
      if(!isNaN(s)&&!isNaN(e)&&e>=s){
        const mon=new Date(s); mon.setDate(s.getDate()-((s.getDay()+6)%7));
        const wk=Math.min(52,Math.max(1,Math.floor((e-mon)/(7*24*3600*1000))+1));
        dateHint.textContent="\u2192 "+wk+" teaching weeks (derived from the dates; overrides the dropdown)";
        return;
      }
    }
    dateHint.textContent=start.value?"Add an end date to derive the weeks and enable week-by-week locking.":"";
  }
  start.addEventListener("change",updDateHint); endd.addEventListener("change",updDateHint); updDateHint();

  const unitList=el("div",{class:"grid",style:"gap:8px"});
  const rows=[];
  function addRow(u){
    const id=u?.id||uid();
    const code=el("input",{value:u?.code||"",placeholder:"Code e.g. RES915"});
    const name=el("input",{value:u?.name||"",placeholder:"Name e.g. Research Project"});
    const del=el("button",{class:"btn ghost sm",type:"button"},"Remove");
    const wrap=el("div",{class:"row",style:"gap:8px;align-items:center"},
      el("div",{style:"flex:0 0 32%"},code),
      el("div",{style:"flex:1"},name),
      del);
    const rec={wrap,id,code,name};
    del.onclick=()=>{ const i=rows.indexOf(rec); if(i>=0)rows.splice(i,1); wrap.remove(); };
    rows.push(rec); unitList.append(wrap);
  }
  (unitsOf(existing).length?unitsOf(existing):[null]).forEach(addRow);
  const addBtn=el("button",{class:"btn ghost sm",type:"button",onclick:()=>addRow()},"+ Add another unit");

  modal(existing?"Edit semester & units":"Add semester",
    el("div",{class:"grid"},
      el("div",{class:"grid",style:"grid-template-columns:1fr 1fr"},
        el("div",{},el("label",{},"Semester label"),label),
        el("div",{},el("label",{},"Teaching weeks"),weeks),
        el("div",{},el("label",{},"Class start date (week 1)"),start),
        el("div",{},el("label",{},"Class end date"),endd),
        el("div",{style:"grid-column:1/-1"},dateHint),
        el("div",{style:"grid-column:1/-1"},
          el("label",{},"Supervisors can record attendance\u2026"),backSel,
          el("div",{class:"muted ui",style:"font-size:12.5px;margin-top:4px"},
            "How far back a supervisor can go in the Attendance register (like Moodle's editing window). Future weeks are always locked. Admin can edit any week."))),
      el("div",{},el("label",{},"Units in this semester"),unitList,
        el("div",{style:"margin-top:8px"},addBtn)),
      el("div",{},el("p",{class:"muted",style:"margin:0"},"Add one or more units. Codes and names can differ each semester. Units appear on the student form, class timetables and the Moodle export. Setting a start date lets the app highlight the current teaching week in the Attendance register and the week planner."))),
    async()=>{
      if(!label.value.trim()){ toast("Enter a semester label.",true); return false; }
      const units=rows.map(r=>({id:r.id,code:r.code.value.trim(),name:r.name.value.trim()}))
        .filter(u=>u.code||u.name);
      if(!units.length){ toast("Add at least one unit.",true); return false; }
      if(units.some(u=>!u.code)){ toast("Each unit needs a code.",true); return false; }
      let wkCount=parseInt(weeks.value);
      if(start.value&&endd.value){
        const s0=new Date(start.value+"T00:00:00"), e0=new Date(endd.value+"T00:00:00");
        if(!isNaN(s0)&&!isNaN(e0)&&e0>=s0){
          const mon=new Date(s0); mon.setDate(s0.getDate()-((s0.getDay()+6)%7));
          wkCount=Math.min(52,Math.max(1,Math.floor((e0-mon)/(7*24*3600*1000))+1));
        }
      }
      const data={label:label.value.trim(),weeks:wkCount,units,
        start:start.value||"",end:endd.value||"",backWeeks:parseInt(backSel.value)};
      if(existing) await DB.update("semesters",existing.id,data);
      else await DB.add("semesters",data);
      S.semesters=await DB.list("semesters"); S.semesters.sort((a,b)=>(a.label>b.label?-1:1));
      if(!existing) S.activeSem=S.semesters.find(x=>x.label===data.label)?.id||S.semesters[0]?.id;
      toast(existing?"Semester updated.":"Semester added."); done(); return true;
    });
}

function staffForm(existing,done){
  const editing=!!existing;
  const name=el("input",{value:existing?.name||""}), email=el("input",{type:"email",value:existing?.email||"",...(editing?{disabled:"disabled"}:{})});
  const mobile=el("input",{type:"tel",value:existing?.mobile||"",placeholder:"e.g. +61 4xx xxx xxx"});
  const pass=el("input",{type:"password",placeholder:editing?"(unchanged — set in Firebase)":"Min 6 characters"});
  const role=el("select",{},
    el("option",{value:"supervisor",...(existing?.role==="supervisor"?{selected:"selected"}:{})},"Supervisor"),
    el("option",{value:"admin",...(existing?.role==="admin"?{selected:"selected"}:{})},"Admin"));
  const cap=el("select",{},
    el("option",{value:"both",...(capOf(existing)==="both"?{selected:"selected"}:{})},"Principal & co-supervisor"),
    el("option",{value:"principal",...(capOf(existing)==="principal"?{selected:"selected"}:{})},"Principal only"),
    el("option",{value:"co",...(capOf(existing)==="co"?{selected:"selected"}:{})},"Co-supervisor only"));
  const area=el("select",{},...AREAS.map(a=>el("option",{value:a,...(a===(existing?.area||AREAS[0])?{selected:"selected"}:{})},a)));
  const capRow=el("div",{},el("label",{},"Supervisor capability"),cap);
  const areaRow=el("div",{},el("label",{},"Supervision area"),area);
  const sync=()=>{ const show = role.value==="supervisor" ? "" : "none"; capRow.style.display=show; areaRow.style.display=show; };
  role.onchange=sync;

  const fields=[
    el("div",{},el("label",{},"Full name"),name),
    el("div",{},el("label",{},"Email"),email),
    el("div",{},el("label",{},"Mobile (optional)"),mobile),
  ];
  if(!editing) fields.push(el("div",{},el("label",{},"Temporary password"),pass));
  fields.push(el("div",{},el("label",{},"Account role"),role), capRow, areaRow,
    el("div",{},el("p",{class:"muted",style:"margin:0"}, editing
      ? "Updates this staff member's profile. Email and password are managed in Firebase Authentication and aren't changed here."
      : "Creates a login account for this person — your own session isn't affected. Capability sets whether this supervisor can be a student's principal, co-supervisor, or either.")));

  modal(editing?"Edit staff":"Add staff login",
    el("div",{class:"grid"},...fields),
    async()=>{
      if(editing){
        const profile={name:name.value.trim(),role:role.value,mobile:mobile.value.trim()};
        if(role.value==="supervisor"){ profile.supRole=cap.value; profile.area=area.value; }
        else { profile.supRole=null; profile.area=null; }
        await DB.updateUser(existing.id,profile);
        S.supervisors=(await DB.listUsers()).filter(u=>u.role==="supervisor");
        toast("Staff updated."); done(); return true;
      }
      if(!email.value.trim()||pass.value.length<6){ toast("Valid email and 6+ char password needed.",true); return false; }
      const profile={email:email.value.trim(),name:name.value.trim(),role:role.value,mobile:mobile.value.trim()};
      if(role.value==="supervisor"){ profile.supRole=cap.value; profile.area=area.value; }
      try{
        // If an import auto-created a profile-only record for this email,
        // carry its details over and remove it once the real login exists,
        // updating any students linked to the old profile id.
        const emailLc=email.value.trim().toLowerCase();
        const orphan=(await DB.listUsers()).find(u=>u.pendingLogin && (u.email||"").toLowerCase()===emailLc);
        if(orphan){
          profile.name=profile.name||orphan.name;
          profile.area=profile.area||orphan.area;
          profile.supRole=profile.supRole||orphan.supRole;
        }
        let newUid;
        if(DEMO){
          newUid="u"+Math.random().toString(36).slice(2,8);
          await DB.setUser(newUid,profile);
        } else {
          // Create the account on the secondary auth instance — the new user
          // is signed in THERE (not on the admin's session), then immediately
          // signed out. The admin stays logged in throughout.
          const factory=getFactoryAuth();
          const cred=await createUserWithEmailAndPassword(factory,email.value.trim(),pass.value);
          newUid=cred.user.uid;
          await DB.setUser(newUid,profile);
          await signOut(factory).catch(()=>{});
        }
        if(orphan && newUid){
          const linked=await DB.list("students");
          for(const s of linked){
            const patch={};
            if(s.principalUid===orphan.id) patch.principalUid=newUid;
            if(s.coUid===orphan.id) patch.coUid=newUid;
            if(Object.keys(patch).length) await DB.update("students",s.id,patch);
            // move any consultations owned by the old profile id too
            if(patch.principalUid){
              const cs=await DB.list("consultations",{studentDocId:s.id});
              for(const c of cs){ if(c.supervisorUid===orphan.id) await DB.update("consultations",c.id,{supervisorUid:newUid}); }
            }
          }
          await DB.removeUser(orphan.id);
        }
        S.supervisors=(await DB.listUsers()).filter(u=>u.role==="supervisor");
        toast("Staff login created — you're still signed in."); done(); return true;
      }catch(e){ toast(e.message||"Could not create account.",true); return false; }
    });
  sync();
}

async function copyForward(fromSem,done){
  const label=el("input",{placeholder:"e.g. Year 2 — Semester 1"});
  const weeks=el("select",{},
    el("option",{value:"12",...((fromSem.weeks||12)===12?{selected:"selected"}:{})},"12 weeks"),
    el("option",{value:"15",...((fromSem.weeks)===15?{selected:"selected"}:{})},"15 weeks"));

  const start=el("input",{type:"date"});

  modal("Carry students forward",
    el("div",{class:"grid"},
      el("p",{class:"muted",style:"margin:0"},"Copies every student (with the same supervisors and unit enrolments) from \u201C"+fromSem.label+"\u201D into a new semester. The units below are carried over too. Timetables, consultations and meeting logs start fresh."),
      el("div",{},el("label",{},"New semester label"),label),
      el("div",{},el("label",{},"Teaching weeks"),weeks),
      el("div",{},el("label",{},"Class start date (week 1, optional)"),start),
      el("div",{},el("label",{},"Class end date (optional)"),cfEnd),
      el("div",{},el("label",{},"Units carried over"),
        el("p",{class:"muted",style:"margin:4px 0 0"},us.length?us.map(u=>u.code).filter(Boolean).join(", "):"None"))),
    async()=>{
      if(!label.value.trim()){ toast("Enter a label.",true); return false; }
      const units=us.map(u=>({id:u.id,code:u.code,name:u.name}));
      let cfWk=parseInt(weeks.value);
      if(start.value&&cfEnd.value){
        const s0=new Date(start.value+"T00:00:00"), e0=new Date(cfEnd.value+"T00:00:00");
        if(!isNaN(s0)&&!isNaN(e0)&&e0>=s0){
          const mon=new Date(s0); mon.setDate(s0.getDate()-((s0.getDay()+6)%7));
          cfWk=Math.min(52,Math.max(1,Math.floor((e0-mon)/(7*24*3600*1000))+1));
        }
      }
      const newId=await DB.add("semesters",{label:label.value.trim(),weeks:cfWk,units,
        start:start.value||"",end:cfEnd.value||"",
        backWeeks:(fromSem.backWeeks===undefined||fromSem.backWeeks===null)?2:fromSem.backWeeks});
      const students=await DB.list("students",{semesterId:fromSem.id});
      for(const s of students){
        const {id,...rest}=s; await DB.add("students",{...rest,semesterId:newId});
      }
      S.semesters=await DB.list("semesters"); S.semesters.sort((a,b)=>(a.label>b.label?-1:1)); S.activeSem=newId;
      toast(`Carried ${students.length} students forward.`); done(); return true;
    },"Carry forward");
}

/* ============================================================
   13. STUDENT READ-ONLY VIEW
   Shows: class time(s), consultation time + meeting link, and the
   student's own week-by-week attendance (attended / missed).
   ============================================================ */
async function renderStudentView(sid,enrolments,sems){
  S.studentSid=sid; S.studentName=enrolments[0]?.name||"";
  const wrap=el("div",{class:"auth-wrap",style:"align-items:flex-start;padding-top:30px"});
  const col=el("div",{style:"width:100%;max-width:760px"});
  const stu=enrolments[0];
  col.append(el("div",{class:"card",style:"border-top:4px solid var(--blue);margin-bottom:16px"},
    el("div",{class:"eyebrow ui",style:"color:var(--blue)"},"Read-only student view"),
    el("h1",{style:"font-size:24px;margin:2px 0"},stu.name),
    el("p",{class:"muted",style:"margin:0"},"ID "+sid+" · "+stu.email),
    el("div",{class:"row",style:"margin-top:10px"},
      el("button",{class:"btn ghost sm",onclick:()=>renderLogin()},"← Back"),
      el("span",{style:"flex:1"}), themeButton())));

  for(const en of enrolments){
    const sem=sems.find(s=>s.id===en.semesterId);
    const weeks=sem?.weeks||12;
    const myUnitIds=en.unitIds||[];
    const myUnitCodes=myUnitIds.map(id=>unitById(sem,id)?.code).filter(Boolean);
    const card=el("div",{class:"card",style:"margin-bottom:14px"});
    card.append(
      el("div",{class:"eyebrow ui"},myUnitCodes.length?myUnitCodes.join(" · "):"No units"),
      el("h3",{style:"margin-top:2px"},sem?.label||"Semester"),
      el("p",{class:"muted",style:"margin:4px 0 12px"},"Campus: "+en.campus+
        (en.area?" · Area: "+en.area:"")+
        " · Principal: "+(en.principalName||"—")+(en.coName?" · Co: "+en.coName:"")));

    // ---- Weekly classes ----
    // Only the classes RUN BY THIS STUDENT'S PRINCIPAL SUPERVISOR, for units the
    // student is enrolled in, and only once admin-approved. A unit may be taught
    // by several supervisors (e.g. one class group per campus); the student must
    // see only their own principal's group, not every campus's.
    const tts=(await DB.list("timetables",{semesterId:en.semesterId}))
      .filter(t=>t.status==="approved"
                 && myUnitIds.includes(t.unitId)
                 && t.supervisorUid===en.principalUid);
    card.append(el("div",{style:"font-weight:600;margin-bottom:4px",class:"ui"},"Weekly classes"));
    if(tts.length) tts.forEach(t=>{
      const u=unitById(sem,t.unitId);
      card.append(el("p",{style:"margin:2px 0"},`${u?.code?u.code+" · ":""}${t.day} ${t.start}–${t.end} · ${t.room||""}`));
    });
    else card.append(el("p",{class:"muted",style:"margin:2px 0"},"Class times not published yet."));

    // ---- Consultation (recurring) + meeting link ----
    const cons=(await DB.list("consultations",{semesterId:en.semesterId}))
      .filter(c=>c.studentDocId===en.id);
    card.append(el("div",{style:"font-weight:600;margin:14px 0 4px",class:"ui"},"My consultation"));
    if(cons.length){
      cons.forEach(c=>{
        const block=el("div",{style:"margin:2px 0 6px"});
        block.append(el("p",{style:"margin:2px 0"},
          el("span",{class:"muted ui",style:"font-size:12px"},"Usual time: "),
          c.day?`${c.day} ${c.start}–${c.end}${c.mode?" · "+c.mode:""}`+(c.principalName?" · with "+c.principalName:"")
               :"No fixed weekly time \u2014 your supervisor arranges each meeting"+(c.principalName?" (with "+c.principalName+")":"")));
        if(c.meetingLink) block.append(el("a",{class:"linkpill",href:c.meetingLink,target:"_blank",rel:"noopener"},"Join meeting"));
        card.append(block);

        // ---- Weeks with a CHANGED time (overrides) ----
        // The supervisor can change one week's time/link. Surface every such
        // week so the student sees it, not just the recurring time. We show all
        // overridden weeks (held or not), since a changed upcoming meeting is
        // exactly what a student needs to know.
        const changed=[];
        for(let w=1;w<=weeks;w++){
          const et=weekTime(c,w);
          if(et.overridden) changed.push({w,et});
        }
        if(changed.length){
          card.append(el("div",{style:"font-weight:600;margin:10px 0 4px",class:"ui"},"Changed meeting times"));
          changed.forEach(({w,et})=>{
            const row=el("div",{style:"margin:2px 0 6px"});
            row.append(el("p",{style:"margin:2px 0"},
              el("span",{class:"pill blue",style:"font-size:11.5px;margin-right:6px"},"Week "+w),
              `${et.day} ${et.start}–${et.end}${et.mode?" · "+et.mode:""}`));
            if(et.link) row.append(el("a",{class:"linkpill",href:et.link,target:"_blank",rel:"noopener"},"Join meeting"));
            card.append(row);
          });
        }

        // ---- My attendance, week by week ----
        const log=c.weeks||{};
        const anyLogged=Object.keys(log).length>0;
        card.append(el("div",{style:"font-weight:600;margin:12px 0 6px",class:"ui"},"My attendance"));
        if(!anyLogged){
          card.append(el("p",{class:"muted",style:"margin:2px 0"},"No meetings recorded yet."));
        } else {
          const grid=el("div",{style:"display:flex;flex-wrap:wrap;gap:6px"});
          for(let w=1;w<=weeks;w++){
            const l=weekLog(c,w);
            let cls="none",txt="W"+w;
            if(l?.held===true){
              if(l.studentAttended===true){ cls="held"; txt="W"+w+" ✓"; }
              else if(l.studentAttended===false){ cls="missed"; txt="W"+w+" ✗"; }
              else { cls="none"; txt="W"+w+" ·"; }
            } else if(l?.held===false){ cls="none"; txt="W"+w+" —"; }
            else continue; // unrecorded weeks: skip in student view
            const et=weekTime(c,w);
            if(et.overridden) txt+=" *"; // time was changed this week
            const pill=el("span",{class:"pill "+cls,title:`${et.day} ${et.start}–${et.end}`+(et.overridden?" (changed time)":"")+(l?.comment?" · "+l.comment:"")},txt);
            grid.append(pill);
          }
          if(!grid.children.length) grid.append(el("span",{class:"muted"},"No meetings recorded yet."));
          card.append(grid);
          // legend
          card.append(el("p",{class:"muted ui",style:"margin:8px 0 0;font-size:13px"},
            "✓ attended · ✗ missed · — not held · * time changed that week · hover a week for the time and any note."));
        }
      });
    } else card.append(el("p",{class:"muted",style:"margin:2px 0"},"Consultation time not set yet."));

    card.append(el("p",{class:"muted ui",style:"margin:12px 0 0;font-size:13px"},
      "Consultations are held in your Team classroom, in your own channel — use the Join button above at the shown time. Attendance is recorded against these meetings. To contact your supervisor, email them directly."));

    // ---- Messages with my supervisors ----
    await studentNotesBlock(card,en);

    col.append(card);
  }

  wrap.append(col);
  document.body.append(wrap, toastNode());
  // "You have new messages" banner at the top of the student's portal
  try{
    const meId=noteMeId();
    let unread=0;
    for(const en of enrolments){
      const ns=await loadNotes(en.semesterId,[en.id]);
      unread+=ns.filter(n=>isUnread(n,meId)).length;
    }
    if(unread){
      const bar=el("div",{class:"card ui",style:"border-left:4px solid var(--blue);padding:12px 14px;margin-bottom:14px"},
        el("div",{class:"row",style:"align-items:center;gap:10px;flex-wrap:wrap"},
          el("span",{class:"pill blue"},"\u2709 "+unread+" new message"+(unread===1?"":"s")),
          el("span",{class:"ui",style:"font-size:13.5px"},"from your supervisors \u2014 scroll down to \u201CMessages with my supervisors\u201D."),
          el("span",{style:"flex:1;min-width:10px"}),
          el("button",{class:"btn ghost sm",onclick:()=>bar.remove()},"Dismiss")));
      col.insertBefore(bar,col.children[1]||null);
    }
  }catch(e){ console.warn("messages banner unavailable:",e?.message||e); }
}

/* Student-side view of the shared supervision thread: read everything
   the supervisors have posted, and reply into the same thread. */
async function studentNotesBlock(card,en){
  const meId=noteMeId();
  let notes;
  try{ notes=await loadNotes(en.semesterId,[en.id]); }
  catch(err){
    card.append(el("div",{style:"font-weight:600;margin:16px 0 6px",class:"ui"},"Messages with my supervisors"),
      el("p",{class:"muted",style:"margin:0"},
        "Messages can't be loaded right now. Please let your supervisor know \u2014 the site's database rules need to allow the \u201Cnotes\u201D collection."));
    return;
  }
  const unread=notes.filter(n=>isUnread(n,meId)).length;

  const head=el("div",{class:"row",style:"align-items:center;gap:8px;font-weight:600;margin:16px 0 6px",...{}},
    el("span",{class:"ui"},"Messages with my supervisors"));
  if(unread) head.append(el("span",{class:"pill missed",style:"font-size:11.5px"},unread+" new"));
  card.append(head);
  card.append(el("p",{class:"muted ui",style:"margin:0 0 8px;font-size:13px"},
    "A shared thread with "+(en.principalName||"your principal supervisor")+
    (en.coName?" and "+en.coName:"")+". Anything you post here is visible to both supervisors and the admin office."));

  const body=el("div",{style:"display:flex;flex-direction:column;gap:8px"});
  const ordered=[...notes].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.createdAt||0)-(a.createdAt||0));
  if(!ordered.length) body.append(el("p",{class:"muted",style:"margin:0"},"No messages yet."));
  ordered.forEach(n=>{
    const isNew=isUnread(n,meId);
    const row=el("div",{style:"border:1px solid var(--line);border-radius:10px;padding:10px 12px"
      +(isNew?";border-left:3px solid var(--blue)":"")+(n.pinned?";background:rgba(127,127,127,.06)":"")});
    const top=el("div",{class:"row",style:"align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px"},
      el("strong",{class:"ui",style:"font-size:13.5px"},n.authorName||"Unknown"),
      el("span",{class:"pill "+rolePillClass(n.authorRole),style:"font-size:11px"},roleLabel(n.authorRole)),
      el("span",{class:"muted ui",style:"font-size:12px"},relTime(n.createdAt)));
    if(n.pinned) top.append(el("span",{class:"pill pending",style:"font-size:11px"},"\u2691 Pinned"));
    if(isNew) top.append(el("span",{class:"pill missed",style:"font-size:11px"},"New"));
    row.append(top, el("div",{style:"white-space:pre-wrap;font-size:14px"},n.text||""));
    body.append(row);
  });
  card.append(body);

  const ta=el("textarea",{placeholder:"Reply to your supervisors\u2026",style:"min-height:70px;margin-top:10px"});
  const actions=el("div",{class:"row",style:"gap:8px;margin-top:8px;flex-wrap:wrap"});
  if(unread) actions.append(el("button",{class:"btn ghost sm",onclick:async()=>{
    await markNotesRead(notes); toast("Marked as read.");
    card.replaceChildren(...[...card.children].slice(0,[...card.children].indexOf(head)));
    await studentNotesBlock(card,en);
  }},"Mark as read"));
  actions.append(el("span",{style:"flex:1;min-width:8px"}));
  actions.append(el("button",{class:"btn sm",onclick:async()=>{
    if(await postNote(en,ta.value,false)){
      toast("Message sent to your supervisors.");
      card.replaceChildren(...[...card.children].slice(0,[...card.children].indexOf(head)));
      await studentNotesBlock(card,en);
    }
  }},"Send message"));
  card.append(ta,actions);
}

/* ============================================================
   14. SHARED MODAL + DELETE
   ============================================================ */
function modal(title,bodyNode,onSave,saveLabel="Save"){
  const bg=el("div",{class:"modal-bg",onclick:e=>{if(e.target===bg)close();}});
  const saveBtn=el("button",{class:"btn"},saveLabel);
  function close(){ bg.remove(); }
  saveBtn.onclick=async()=>{
    saveBtn.disabled=true;
    try{
      const ok=await onSave();
      saveBtn.disabled=false;
      if(ok!==false)close();
    }catch(err){
      // e.g. Firestore "Missing or insufficient permissions" — show it,
      // don't fail silently with the modal stuck open
      saveBtn.disabled=false;
      console.error(err);
      toast((err&&err.message)||"Could not save — check your connection or permissions.",true);
    }
  };
  const m=el("div",{class:"modal ui"},
    el("h3",{},title), bodyNode,
    el("div",{class:"row",style:"justify-content:flex-end;margin-top:18px"},
      el("button",{class:"btn ghost",onclick:close},"Cancel"), saveBtn));
  bg.append(m); document.body.append(bg);
}
// confirmDelete: deletes a record. If cascade=true and it's a student/consultation,
// related records are tidied up so no orphan logs remain.
function confirmDelete(coll,id,name,done,custom){
  modal("Delete "+name+"?",
    el("p",{class:"muted",style:"margin:0"},"This cannot be undone."+
      (coll==="students"?" Linked consultations, meeting logs and messages for this student are also removed.":"")+
      (coll==="semesters"?" Students, timetables and consultations in this semester remain but will be orphaned — delete with care.":"")),
    async()=>{
      if(custom){ await done(); return true; }
      if(coll==="students"){
        const cs=await DB.list("consultations",{studentDocId:id});
        for(const c of cs) await DB.remove("consultations",c.id);
        const ns=await DB.list("notes",{studentDocId:id});
        for(const n of ns) await DB.remove("notes",n.id);
        const ats=await DB.list("attendance",{studentDocId:id});
        for(const a of ats) await DB.remove("attendance",a.id);
      }
      await DB.remove(coll,id); toast("Deleted."); done(); return true;
    },"Delete");
  const btns=document.querySelectorAll(".modal .btn"); btns[btns.length-1].classList.add("danger");
}
