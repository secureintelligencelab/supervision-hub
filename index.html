<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MRes Supervision Hub</title>
<style>
  /* ============================================================
     DESIGN TOKENS
     Palette: "Field notebook" — ink, paper, supervisory teal,
     approval amber, alert clay. Ruled-paper structure, ink-on-cream.
     ============================================================ */
  :root{
    --ink:#14181c;
    --ink-soft:#39424a;
    --paper:#f6f3ec;
    --paper-2:#fffdf8;
    --line:#d4cdbe;
    --line-strong:#b0a896;
    --teal:#1a5f5b;
    --teal-deep:#0e423f;
    --amber:#b97c0c;
    --amber-soft:#f3e3bf;
    --clay:#a8401f;
    --clay-soft:#f1d9d2;
    --green:#367044;
    --green-soft:#d2e6d3;
    --blue:#33548a;
    --blue-soft:#d6e1f1;
    --shadow:0 1px 0 var(--line-strong),0 6px 24px -12px rgba(28,32,36,.4);
    --r:10px;
  }
  *{box-sizing:border-box}

  /* ---- Dark mode -------------------------------------------------------
     Applied by JS as html[data-theme="dark"]; defaults to the system
     preference, and the header moon/sun button remembers the user's choice.
     Same "field notebook" character, printed on dark stock. ------------- */
  html[data-theme="dark"]{
    color-scheme:dark;
    --ink:#e7e3d8; --ink-soft:#a9a294;
    --paper:#14171b; --paper-2:#1d2126;
    --line:#32383f; --line-strong:#4a525a;
    --teal:#2f8f89; --teal-deep:#8fd6cf;
    --amber:#c98f1f; --amber-soft:#3a2f14;
    --clay:#c05936; --clay-soft:#402019;
    --green:#3f8a51; --green-soft:#1d3423;
    --blue:#5b82c4; --blue-soft:#243450;
    --shadow:0 1px 0 #00000066,0 6px 24px -12px rgba(0,0,0,.85);
  }
  html[data-theme="dark"] header.app{background:#0c0e11;color:var(--ink);border-bottom-color:var(--teal)}
  html[data-theme="dark"] .brand h1{color:var(--ink)}
  html[data-theme="dark"] #toast{background:#2a2f36;color:var(--ink)}
  html[data-theme="dark"] tr:hover td{background:#ffffff0a}
  html[data-theme="dark"] .btn.ghost:hover{background:#ffffff0d}
  html[data-theme="dark"] code{background:#ffffff14}
  html[data-theme="dark"] nav.tabs button{background:linear-gradient(#22272e,#1b1f24);box-shadow:inset 0 -6px 8px -8px rgba(0,0,0,.7)}
  html[data-theme="dark"] nav.tabs button:hover{background:var(--paper-2)}
  html[data-theme="dark"] nav.tabs button.active{background:var(--paper-2)}
  html[data-theme="dark"] .auth-wrap{background:
    repeating-linear-gradient(transparent,transparent 31px,#ffffff07 31px,#ffffff07 32px),var(--paper)}
  html[data-theme="dark"] .pill.pending{color:#eec984}
  html[data-theme="dark"] .pill.approved,html[data-theme="dark"] .pill.held{color:#9fd8ab}
  html[data-theme="dark"] .pill.none{background:#2b3138;color:#a9a294}
  html[data-theme="dark"] .pill.missed{color:#f0a68f}
  html[data-theme="dark"] .pill.blue,html[data-theme="dark"] .pill.area-it{color:#aac5f0}
  html[data-theme="dark"] .pill.area-business{color:#eec984}
  html[data-theme="dark"] .linkpill{color:#aac5f0}
  html[data-theme="dark"] .att-cell.P{color:#9fd8ab}
  html[data-theme="dark"] .att-cell.A{background:var(--clay-soft);color:#f0a68f}
  html[data-theme="dark"] .att-cell.E{color:#eec984}
  html[data-theme="dark"] .att-cell.-{color:#565e66}
  html[data-theme="dark"] .stucard.active{background:#2f8f8926}
  html[data-theme="dark"] .ctime{background:#2f8f891f}
  html[data-theme="dark"] .weeklog .wrow.now{background:#2f8f891a}
  html[data-theme="dark"] .wksq.ok{color:#9fd8ab}
  html[data-theme="dark"] .wksq.miss{color:#f0a68f}
  html[data-theme="dark"] .wksq.heldsq{color:#aac5f0}
  html[data-theme="dark"] .locknote{color:#eec984}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    line-height:1.55;font-size:16.5px;
  }
  body, input, select, button, textarea{font-family:inherit}
  .ui{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  h1,h2,h3{font-weight:600;letter-spacing:-.01em;line-height:1.15;margin:0}
  a{color:var(--teal-deep)}
  button{cursor:pointer;font-size:15px}
  input,select,textarea{
    font-size:15.5px;padding:10px 12px;border:1px solid var(--line-strong);
    border-radius:8px;background:var(--paper-2);color:var(--ink);width:100%;
  }
  textarea{resize:vertical;min-height:62px;line-height:1.45}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:var(--teal)}
  label{font-size:13.5px;font-weight:700;color:var(--ink-soft);display:block;margin:0 0 5px;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;text-transform:uppercase;letter-spacing:.04em}
  .btn{
    display:inline-flex;align-items:center;gap:7px;border:1px solid var(--teal-deep);
    background:var(--teal);color:#fff;padding:10px 16px;border-radius:8px;font-weight:600;font-size:15px;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    transition:filter .12s;width:auto;
  }
  .btn:hover{filter:brightness(1.07)}
  .btn:active{filter:brightness(.95)}
  .btn.ghost{background:transparent;color:var(--teal-deep);border-color:var(--line-strong)}
  .btn.ghost:hover{background:#0000000a;filter:none}
  .btn.danger{background:var(--clay);border-color:#7e3017}
  .btn.amber{background:var(--amber);border-color:#8a5b0a}
  .btn.blue{background:var(--blue);border-color:#264068;color:#fff}
  .btn.sm{padding:6px 12px;font-size:13.5px;border-radius:6px}
  .btn.xs{padding:4px 10px;font-size:12.5px;border-radius:6px}
  .btn:disabled{opacity:.45;cursor:not-allowed;filter:none}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .grid{display:grid;gap:12px}
  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
  .muted{color:var(--ink-soft);font-size:14.5px}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;
    padding:4px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;
    font-family:ui-sans-serif,system-ui,sans-serif}
  .pill.pending{background:var(--amber-soft);color:#7a5408}
  .pill.approved{background:var(--green-soft);color:#235c30}
  .pill.none{background:#eee9dd;color:#6b6555}
  .pill.held{background:var(--green-soft);color:#235c30}
  .pill.missed{background:var(--clay-soft);color:#7e3017}
  .pill.blue{background:var(--blue-soft);color:#264068}
  .nbadge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;
    padding:0 5px;margin-left:6px;border-radius:9px;background:var(--clay,#c2410c);color:#fff;
    font-size:11px;font-weight:700;line-height:1;vertical-align:middle}
  table{width:100%;border-collapse:collapse;font-size:15px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  th{font-family:ui-sans-serif,system-ui,sans-serif;font-size:12.5px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--ink-soft);font-weight:700}
  tr:hover td{background:#0000000d}
  .hidden{display:none!important}

  header.app{
    background:var(--ink);color:var(--paper);padding:0 22px;
    display:flex;align-items:center;justify-content:space-between;height:62px;
    border-bottom:3px solid var(--teal);
  }
  .brand{display:flex;align-items:center;gap:12px}
  .brand .mark{
    width:36px;height:36px;border-radius:7px;background:var(--teal);
    display:grid;place-items:center;font-weight:700;color:#fff;font-family:ui-sans-serif,sans-serif;
    box-shadow:inset 0 0 0 1px #ffffff22;
  }
  .brand h1{font-size:18px;color:var(--paper)}
  .brand .sub{font-size:11.5px;color:#c4bdac;font-family:ui-sans-serif,sans-serif;letter-spacing:.05em;text-transform:uppercase}
  .who{display:flex;align-items:center;gap:12px;font-family:ui-sans-serif,sans-serif;font-size:14px}
  .who .role{font-size:11.5px;color:#c4bdac;text-transform:uppercase;letter-spacing:.05em}

  main{max-width:1180px;margin:0 auto;padding:0 22px 22px}

  /* ---- Notebook divider tabs -------------------------------------------
     Styled like the index tabs of a physical field notebook: raised card
     dividers resting on the rule line. The active tab overlaps the rule so
     it reads as attached to the page, with a teal ink stripe along its top.
     The strip is sticky, so navigation stays in reach on long pages. ----- */
  nav.tabs{
    display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;
    margin:0 0 22px;padding-top:18px;
    position:sticky;top:0;z-index:20;
    /* the notebook rule line, drawn as a background stripe so the active
       tab can sit over it without negative margins */
    background:
      linear-gradient(var(--line-strong),var(--line-strong)) left bottom/100% 2px no-repeat,
      var(--paper);
  }
  nav.tabs button{
    position:relative;border:1px solid var(--line);border-bottom:none;
    background:linear-gradient(#f0ebde,#e9e3d3);
    color:var(--ink-soft);font-weight:600;font-size:14.5px;
    font-family:ui-sans-serif,system-ui,sans-serif;
    padding:9px 15px 10px;margin-bottom:2px;border-radius:9px 9px 0 0;
    box-shadow:inset 0 -6px 8px -8px rgba(28,32,36,.35);
    transition:background .15s,color .15s,box-shadow .15s,margin .15s,padding .15s;
  }
  nav.tabs button:hover{background:var(--paper-2);color:var(--ink)}
  nav.tabs button:focus-visible{outline:2px solid var(--teal);outline-offset:-2px}
  nav.tabs button.active{
    background:var(--paper-2);color:var(--teal-deep);font-weight:700;
    border-color:var(--line-strong);
    margin-bottom:0;padding-bottom:12px;   /* drops onto the rule and covers it */
    box-shadow:inset 0 3px 0 var(--teal);  /* teal ink stripe along the tab top */
  }

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
  .field{min-width:150px}
  .section-title{display:flex;align-items:center;gap:10px;margin:0 0 14px}
  .section-title h2{font-size:24px}
  .eyebrow{font-family:ui-sans-serif,sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;color:var(--teal-deep);margin-bottom:3px}

  .auth-wrap{min-height:100vh;display:grid;place-items:center;padding:20px;
    background:
      repeating-linear-gradient(transparent,transparent 31px,#0000000a 31px,#0000000a 32px),
      var(--paper);
  }
  .auth-card{width:100%;max-width:400px;background:var(--paper-2);border:1px solid var(--line);
    border-radius:14px;padding:30px;box-shadow:var(--shadow);border-top:4px solid var(--teal)}
  .auth-card .mark-lg{width:46px;height:46px;border-radius:10px;background:var(--teal);color:#fff;
    display:grid;place-items:center;font-weight:700;font-size:20px;font-family:ui-sans-serif,sans-serif;margin-bottom:14px}
  .seg{display:flex;background:#0000000d;border-radius:9px;padding:3px;margin:16px 0;gap:3px}
  .seg button{flex:1;border:none;background:none;padding:8px;border-radius:7px;font-weight:600;
    font-family:ui-sans-serif,sans-serif;color:var(--ink-soft)}
  .seg button.active{background:var(--paper-2);color:var(--teal-deep);box-shadow:var(--shadow)}

  .modal-bg{position:fixed;inset:0;background:rgba(28,32,36,.5);display:grid;place-items:center;padding:18px;z-index:50}
  .modal{background:var(--paper-2);border-radius:14px;max-width:560px;width:100%;padding:24px;
    max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    box-shadow:0 20px 60px -20px rgba(0,0,0,.5);max-height:90vh;overflow:auto}
  .modal.wide{max-width:760px}
  .modal h3{font-size:19px;margin-bottom:14px}

  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120%);
    background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:9px;
    border-left:4px solid var(--teal);
    font-family:ui-sans-serif,sans-serif;font-size:14px;z-index:99;transition:transform .25s;box-shadow:var(--shadow);max-width:90vw}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast.err{background:var(--clay);border-left-color:#7e3017}

  /* Keyboard focus is always visible */
  .btn:focus-visible,.seg button:focus-visible,.seg3 button:focus-visible{
    outline:2px solid var(--teal);outline-offset:2px}

  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important;scroll-behavior:auto!important}
  }

  .att-grid{overflow:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--paper-2)}
  .att-grid table{font-size:14px;min-width:640px}
  .att-grid th, .att-grid td{white-space:nowrap}
  .att-cell{cursor:pointer;text-align:center;width:34px;font-weight:700;user-select:none}
  .att-cell.P{background:var(--green-soft);color:#235c30}
  .att-cell.A{background:#f1d9d2;color:#8f3823}
  .att-cell.E{background:var(--amber-soft);color:#7a5408}
  .att-cell.-{color:#c7c0b0}

  .empty{text-align:center;padding:48px 20px;color:var(--ink-soft)}
  .empty .big{font-size:30px;margin-bottom:8px;opacity:.5}
  .stat{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .stat .b{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;min-width:130px}
  .stat .n{font-size:30px;font-weight:700;font-family:ui-sans-serif,sans-serif;color:var(--ink)}
  .stat .l{font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-family:ui-sans-serif,sans-serif;font-weight:600}

  /* Weekly meeting log */
  .weeklog{border:1px solid var(--line-strong);border-radius:var(--r);overflow:hidden}
  .weeklog .wrow{display:grid;grid-template-columns:72px 1fr;border-bottom:1px solid var(--line)}
  .weeklog .wrow:last-child{border-bottom:none}
  .weeklog .wk{background:#0000000f;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:12px 4px;font-family:ui-sans-serif,sans-serif;border-right:1px solid var(--line)}
  .weeklog .wk .num{font-size:22px;font-weight:800;color:var(--ink)}
  .weeklog .wk .lab{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600}
  .weeklog .wbody{padding:13px 14px}
  .weeklog .wmeta{display:flex;gap:9px;flex-wrap:wrap;align-items:center;font-size:14px;font-family:ui-sans-serif,sans-serif;color:var(--ink)}
  .seg3{display:inline-flex;border:1px solid var(--line-strong);border-radius:7px;overflow:hidden}
  .seg3 button{border:none;background:var(--paper-2);padding:7px 13px;font-size:13.5px;font-weight:600;
    font-family:ui-sans-serif,sans-serif;color:var(--ink-soft);border-right:1px solid var(--line)}
  .seg3 button:last-child{border-right:none}
  .seg3 button.on.yes{background:var(--green);color:#fff}
  .seg3 button.on.no{background:var(--clay);color:#fff}
  .seg3 button.on.na{background:var(--ink-soft);color:#fff}
  .wcomment{margin-top:10px}
  .wcomment textarea{min-height:44px;font-size:14.5px}
  .linkpill{font-family:ui-sans-serif,sans-serif;font-size:13px;display:inline-flex;align-items:center;gap:5px;
    background:var(--blue-soft);color:#22406a;padding:4px 11px;border-radius:99px;text-decoration:none;font-weight:700}

  /* Consultation rows — one card per student */
  .consult-list{display:grid;gap:10px}
  .ccard{display:grid;grid-template-columns:minmax(200px,1.25fr) 138px 1.1fr auto;gap:16px;align-items:center;
    background:var(--paper-2);border:1px solid var(--line);border-left:4px solid var(--teal);
    border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}
  .ccard.unset{border-left-color:var(--amber)}
  .cname{font-size:16px}
  .ctime{background:#1a5f5b10;border:1px solid var(--line);border-radius:9px;padding:8px 12px;text-align:center}
  .ccard.unset .ctime{background:var(--amber-soft);border-color:transparent}
  .cday{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--teal-deep)}
  .chrs{font-size:17px;font-weight:800;color:var(--ink);letter-spacing:-.01em}
  .attmini{display:flex;align-items:center;gap:9px;margin-top:7px;font-size:12.5px;color:var(--ink-soft)}
  .attbar{flex:0 0 90px;height:7px;border-radius:99px;background:var(--line);overflow:hidden}
  .attbar .fill{height:100%;background:var(--green);border-radius:99px}
  .attbar .fill.low{background:var(--clay)}
  .cact{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .ccard .wktable{grid-column:1/-1}
  .ccard .wktable table{width:100%;border-collapse:collapse}
  .ccard .wktable th{text-align:left;padding:7px 10px;background:#0000000a;border-bottom:1px solid var(--line);
    font-weight:700;text-transform:uppercase;letter-spacing:.03em}
  .ccard .wktable td{padding:6px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  .ccard .wktable tr:last-child td{border-bottom:none}
  @media (max-width:820px){
    .ccard{grid-template-columns:1fr;gap:9px}
    .ctime{display:flex;gap:10px;align-items:baseline;justify-content:flex-start;text-align:left;width:fit-content;padding:6px 12px}
    .cact{justify-content:flex-start}
  }

  /* Attendance week navigation — one week at a time */
  .weeknav{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .wkstrip{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
  .wksq{width:31px;height:31px;border-radius:7px;border:1px solid var(--line-strong);
    background:var(--paper-2);font:600 12px ui-sans-serif,system-ui,sans-serif;
    color:var(--ink-soft);cursor:pointer;padding:0}
  .wksq.ok{background:var(--green-soft);color:#256a37;border-color:transparent}
  .wksq.miss{background:var(--clay-soft);color:#8a3315;border-color:transparent}
  .wksq.heldsq{background:var(--blue-soft);color:#2c4a80;border-color:transparent}
  .wksq.nh{background:var(--line);border-color:transparent}
  .wksq.future{opacity:.4;cursor:default}
  .wksq.sel{outline:2px solid var(--teal);outline-offset:1px}
  .locknote{margin-top:9px;font-size:12.5px;color:#7a5408;background:var(--amber-soft);
    border-radius:7px;padding:7px 11px;display:inline-block}

  /* Attendance student picker — tappable cards */
  .stupick{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:16px}
  .stucard{display:flex;flex-direction:column;align-items:flex-start;gap:4px;text-align:left;
    border:1px solid var(--line-strong);background:var(--paper-2);border-radius:9px;
    padding:10px 14px;min-width:158px;cursor:pointer;
    transition:box-shadow .12s,border-color .12s,background .12s}
  .stucard:hover{border-color:var(--teal)}
  .stucard .nm{font-weight:700;font-size:14.5px;font-family:ui-sans-serif,system-ui,sans-serif;color:var(--ink)}
  .stucard .mt{font-size:11.5px;color:var(--ink-soft)}
  .stucard.active{border-color:var(--teal);background:#1a5f5b0f;
    box-shadow:inset 0 0 0 1px var(--teal),var(--shadow)}

  /* Week planner (My week) */
  .weekgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:12px}
  .daycol{padding:13px}
  .dayhead{font-family:ui-sans-serif,system-ui,sans-serif;font-weight:700;font-size:12.5px;
    text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);
    border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:9px}
  .slot{border:1px solid var(--line);border-left:4px solid var(--teal);border-radius:7px;
    padding:8px 10px;margin-bottom:8px;background:var(--paper)}
  .slot:last-child{margin-bottom:0}
  .slot.consult{border-left-color:var(--blue)}
  .slot-time{font-size:12.5px;font-weight:700;color:var(--ink-soft)}
  .slot-label{font-weight:600;font-size:14.5px;line-height:1.3;margin-top:1px}
  .slot-sub{font-size:12.5px;margin-top:1px}

  /* Attendance log: highlight the current teaching week */
  .weeklog .wrow.now{background:#1a5f5b0d}
  .weeklog .wrow.now .wk{background:var(--teal);border-right-color:var(--teal-deep)}
  .weeklog .wrow.now .wk .num,.weeklog .wrow.now .wk .lab{color:#fff}

  details.help{margin-top:14px;font-size:14px}
  details.help summary{cursor:pointer;font-family:ui-sans-serif,sans-serif;color:var(--teal-deep);font-weight:600}
  code{background:#0000000d;padding:1px 5px;border-radius:4px;font-size:13.5px}

  .pill.area-it{background:var(--blue-soft);color:#264068}
  .pill.area-business{background:var(--amber-soft);color:#7a5408}

/* ---- Mobile tables ----
   Copies each column header onto its cells (data-label) and tags the table
   `resp`, letting the phone stylesheet stack every row into a label/value
   card. Runs automatically for every table any view renders — no per-view
   work needed. Desktop and print layouts are untouched. */
function labelTable(t){
  const heads=[...t.querySelectorAll("thead th")].map(th=>th.textContent.trim());
  if(!heads.length) return;
  t.querySelectorAll("tbody tr").forEach(tr=>{
    [...tr.children].forEach((td,i)=>td.setAttribute("data-label",heads[i]??""));
  });
  t.classList.add("resp");
}
new MutationObserver(muts=>{
  for(const m of muts) for(const n of m.addedNodes){
    if(n.nodeType!==1) continue;
    if(n.tagName==="TABLE") labelTable(n);
    else n.querySelectorAll?.("table").forEach(labelTable);
  }
}).observe(document.documentElement,{childList:true,subtree:true});

function weekTime(cons,w){
  const ov=(cons?.weeks?.[w]) || (cons?.weeks?.[String(w)]) || {};
  return {
    day:   ov.day   || cons.day,
    start: ov.start || cons.start,

    mode:  ov.mode  || cons.mode,

}

// Which class slots a SUPERVISOR may see:
//  - classes assigned to them by admin, and
//  - for students they co-supervise, ONLY the approved class run by that
//    student's PRINCIPAL supervisor for a unit the student is enrolled in.
// (A unit can have several class groups — one per supervisor/campus — and a
//  co-supervisor must see only their principal's group, not every group.)
function classSlotsFor(tts,myStudents){
  if(S.role!=="supervisor") return tts;
  const coPairs=new Set();
  myStudents
    .filter(s=>s.coUid===S.uid && s.principalUid && s.principalUid!==S.uid)
    .forEach(s=>(s.unitIds||[]).forEach(id=>coPairs.add(id+"|"+s.principalUid)));
  return tts.filter(t=>
    t.supervisorUid===S.uid ||                                          // my own classes
    (t.status==="approved" && coPairs.has(t.unitId+"|"+t.supervisorUid)) // principal's class for my co-students
  );
}

// Current teaching week, derived from the semester's (optional) start date.
// Week 1 begins on the Monday of the week containing the start date.
// Returns null when no start date is set or we're outside the teaching weeks.
function currentWeekOf(sem){
  if(!sem?.start) return null;
  const s=new Date(sem.start+"T00:00:00");
  if(isNaN(s.getTime())) return null;
  const mon=new Date(s); mon.setDate(s.getDate()-((s.getDay()+6)%7));
  const now=new Date(); now.setHours(0,0,0,0);
  const wk=Math.floor((now-mon)/(7*24*3600*1000))+1;
  return (wk>=1 && wk<=(sem.weeks||12)) ? wk : null;
}

// Monday & Saturday dates of a given teaching week (null when no start date).
function semWeekBounds(sem,w){
  if(!sem?.start) return null;
  const s=new Date(sem.start+"T00:00:00");
  if(isNaN(s.getTime())) return null;
  const mon=new Date(s); mon.setDate(s.getDate()-((s.getDay()+6)%7)+(w-1)*7);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);   // weeks run Mon\u2013Sun
  return {mon,sun};
}
function weekRangeLabel(sem,w){
  const b=semWeekBounds(sem,w); if(!b) return "";
  const f=d=>d.getDate()+" "+d.toLocaleString("en",{month:"short"});
  return f(b.mon)+" \u2013 "+f(b.sun);
}
// Reference week for the attendance editing window:
//   before the semester -> 0 (nothing recordable yet)
//   during              -> the current teaching week
//   after it ends       -> the final week (window counts back from there)
//   no start date       -> null (no date-based locking possible)
function lockRefWeek(sem){
  if(!sem?.start) return null;
  const s=new Date(sem.start+"T00:00:00");
  if(isNaN(s.getTime())) return null;
  const mon=new Date(s); mon.setDate(s.getDate()-((s.getDay()+6)%7));
  const now=new Date(); now.setHours(0,0,0,0);
  const wk=Math.floor((now-mon)/(7*24*3600*1000))+1;
  if(wk<1) return 0;
  return Math.min(wk, sem.weeks||12);
}
// counts across a consultation's weeks
function consultStats(cons,totalWeeks){
  let held=0, attended=0, missed=0, logged=0;
  for(let w=1;w<=totalWeeks;w++){
    const l=weekLog(cons,w); if(!Object.keys(l).length) continue;
    if(l.held===true||l.held===false) logged++;
    if(l.held===true){ held++;
      if(l.studentAttended===true) attended++;
      else if(l.studentAttended===false) missed++;
    }
  }
  return {held,attended,missed,logged};
}

/* ------------------------------------------------------------
   3b. SUPERVISION NOTES (message board)
   One thread per student. Principal, co-supervisor, admin and the
   student all post into the same thread, so nobody is working from
   a different copy. `readBy` tracks who has seen each note, which
   drives the unread badge on the tab and the banner shown at login.
   ------------------------------------------------------------ */
// Identity used in readBy / authorUid. Students have no auth account,
// so they are keyed by their student ID.
function noteMeId(){ return S.studentSid ? ("student:"+S.studentSid) : S.uid; }
function noteMeName(){ return S.studentName || S.userName || S.user?.email || "Unknown"; }
// Role of the current viewer *relative to a given student*.
function noteMyRole(stu){
  if(S.studentSid) return "student";
  if(S.role==="admin") return "admin";
  if(stu && stu.coUid===S.uid && stu.principalUid!==S.uid) return "co";
  return "principal";
}
function roleLabel(r){
  return r==="principal"?"Principal supervisor":r==="co"?"Co-supervisor":r==="admin"?"Admin":"Student";
}
function rolePillClass(r){
  return r==="principal"?"held":r==="co"?"blue":r==="admin"?"pending":"none";
}
function isUnread(n,meId){ return !(n.readBy&&n.readBy[meId]) && n.authorUid!==meId; }

// All notes for a set of students, newest first.
// Errors are surfaced, not swallowed: if Firestore rules block the `notes`
// collection the tab would otherwise render as a blank page with no clue why.
async function loadNotes(semesterId,studentIds){
  let all;
  try{
    all=await DB.list("notes", semesterId?{semesterId}:{});
  }catch(err){
    console.error("loadNotes failed",err);
    const e=new Error(err?.message||"Could not read messages");
    e.notesRuleError=true; throw e;
  }
  const set=studentIds?new Set(studentIds):null;
  return all.filter(n=>!set||set.has(n.studentDocId))
            .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
}
async function postNote(stu,text,pinned){
  const t=(text||"").trim();
  if(!t) { toast("Write something first.",true); return false; }
  const meId=noteMeId();
  await DB.add("notes",{
    semesterId:stu.semesterId||S.activeSem, studentDocId:stu.id,
    authorUid:meId, authorName:noteMeName(), authorRole:noteMyRole(stu),
    text:t, createdAt:Date.now(), pinned:!!pinned, readBy:{[meId]:true}
  });
  return true;
}
async function markNotesRead(notes){
  const meId=noteMeId();
  const todo=notes.filter(n=>isUnread(n,meId));
  for(const n of todo){
    await DB.update("notes",n.id,{readBy:{...(n.readBy||{}),[meId]:true}});
    n.readBy={...(n.readBy||{}),[meId]:true};
  }
  return todo.length;
}
function relTime(ms){
  if(!ms) return "";
  const d=Math.floor((Date.now()-ms)/1000);
  if(d<60) return "just now";
  if(d<3600) return Math.floor(d/60)+" min ago";
  if(d<86400) return Math.floor(d/3600)+" h ago";
  if(d<604800) return Math.floor(d/86400)+" d ago";
  return new Date(ms).toLocaleDateString();
}

  if(S.role==="supervisor") students=students.filter(s=>s.principalUid===S.uid||s.coUid===S.uid);
  return students;

    const sems=await DB.list("semesters");

/* Unread count on the Messages tab, refreshed after any note action. */
async function refreshUnreadBadge(){
  try{
    const b=S.notesTabBtn; if(!b||!b.isConnected) return;
    const students=await myNoteStudents();
    const notes=await loadNotes(S.activeSem,students.map(s=>s.id));
    const meId=noteMeId();
    const n=notes.filter(x=>isUnread(x,meId)).length;
    const dot=b.querySelector(".nbadge");
    if(!dot) return;
    dot.textContent=n>99?"99+":String(n);
    dot.style.display=n?"inline-flex":"none";
    S.unreadNotes=n;
  }catch(e){ console.warn("unread badge unavailable:",e?.message||e); }
}

/* Login banner: on sign-in, show what's waiting rather than making the
   user hunt for it. Appears once per session, above the tab content. */
async function showInboxBanner(){
  if(S.bannerShown) return; S.bannerShown=true;
  try{
    const students=await myNoteStudents();
    const notes=await loadNotes(S.activeSem,students.map(s=>s.id));
    const meId=noteMeId();
    const unread=notes.filter(n=>isUnread(n,meId));
    if(!unread.length) return;
    const byStudent=new Map();
    unread.forEach(n=>byStudent.set(n.studentDocId,(byStudent.get(n.studentDocId)||0)+1));
    const names=[...byStudent.keys()].map(id=>students.find(s=>s.id===id)?.name).filter(Boolean);
    const bar=el("div",{class:"card ui inbox-banner",style:"border-left:4px solid var(--blue);margin:0 0 14px;padding:12px 14px"},
      el("div",{class:"row",style:"align-items:center;gap:10px;flex-wrap:wrap"},
        el("span",{class:"pill blue"},"\u2709 "+unread.length+" new message"+(unread.length===1?"":"s")),
        el("span",{class:"ui",style:"font-size:13.5px"},
          "from your supervision threads"+(names.length?" \u00B7 "+names.slice(0,3).join(", ")+(names.length>3?" +"+(names.length-3)+" more":""):"")),
        el("span",{style:"flex:1;min-width:10px"}),
        el("button",{class:"btn sm",onclick:()=>{
          S.tab="notes";
          const strip=document.querySelector("nav.tabs");
          if(strip) [...strip.children].forEach(x=>x.classList.toggle("active",x.textContent.startsWith("Messages")));
          drawMain();
          bar.remove();
        }},"Read them"),
        el("button",{class:"btn ghost sm",onclick:()=>bar.remove()},"Dismiss")));
    const main=document.querySelector("main");
    const view=$("#view");
    if(main&&view) main.insertBefore(bar,view);
  }catch(e){ console.warn("messages banner unavailable:",e?.message||e); }
}

      [s.name,s.sid,s.email,s.principalName].some(x=>(x||"").toLowerCase().includes(term)));

                     : mode==="area"      ? (s.area||"No area set")
                     :                      (s.campus||"Unassigned");

      list.sort((a,b)=>(a.name||"").localeCompare(b.name||"")).forEach(s=>{

        cells.push(
          el("td",{},codes.length?codes.join(", "):el("span",{class:"muted"},"—")),

        if(mode!=="principal") cells.push(el("td",{},s.principalName||"—"));
        cells.push(el("td",{},s.coName||"—"));
        if(S.role==="admin"){
          cells.push(el("td",{},el("div",{class:"row"},

          }
          cells.push(el("td",{},contact));
        }
        tb.append(el("tr",{},...cells));
      });
      t.append(tb); card.append(t); body.append(card);
    });
  }
  search.oninput=render; campusFilter.onchange=render; areaFilter.onchange=render; groupSel.onchange=render;
  render();

      const cName=S.supervisors.find(u=>u.id===co.value)?.name||S.supervisors.find(u=>u.id===co.value)?.email||"";

        campus:campus.value,area:area.value,unitIds,principalUid:prin.value,coUid:co.value,principalName:pName,coName:cName};
      if(existing) await DB.update("students",existing.id,data); else await DB.add("students",data);
      // keep linked consultation's denormalised supervisor names in sync
      if(existing){
        const cons=await DB.list("consultations",{studentDocId:existing.id});
        for(const c of cons){ await DB.update("consultations",c.id,{coUid:co.value,coName:cName,principalName:pName}); }
      }
      toast("Saved."); done(); return true;
    });
}

/* ---- STUDENT IMPORT (CSV file OR pasted rows) ----
   Accepts the supervisor-wise allocation list straight from the spreadsheet:
     Student Name | Student ID | Student Email | Principal Supervisor |
     Principal Supervisor Email | Co-Supervisor Name | Co-supervisor Email
   Tab- or comma-separated, header row required (column order is free — headers
   are matched by meaning). Supervisors are identified by EMAIL, so different
   spellings of the same name ("Associate Professor John Ayoade" vs
   "A/Prof John Ayoade") resolve to one supervisor. Supervisors not yet on the
   staff list are auto-created as profiles (admin adds their login later).
   Re-importing a student ID that already exists in this semester UPDATES that
   student instead of duplicating them. */
function importCSV(done){
  const sem=activeSemester();
  const input=el("input",{type:"file",accept:".csv,.txt,.tsv"});
  const paste=el("textarea",{
    placeholder:"…or paste rows copied from Excel here (header row first).\nExample:\nStudent Name\tStudent ID\tStudent Email\tPrincipal Supervisor\tPrincipal Supervisor Email\tCo-Supervisor Name\tCo-supervisor Email\nHasibul Haque Hira\tcihe260061\tcihe260061@student.cihe.edu.au\tAssociate Professor John Ayoade\tjohn.ayoade@cihe.edu.au\tDr Madhumita Abhijeet Takalkar\tmadhumita.takalkar@cihe.edu.au",
    style:"min-height:130px;font-size:13px;font-family:ui-monospace,monospace"});
  const areaSel=el("select",{},...AREAS.map(a=>el("option",{value:a},a)));
  const preview=el("div",{class:"muted",style:"margin-top:10px"});
  let rows=[];

  function refreshPreview(){
    preview.innerHTML="";
    if(!rows.length){ preview.textContent="No rows detected yet."; return; }
    const missing=rows.filter(r=>!r.name||!r.sid).length;
    const supEmails=new Set();
    rows.forEach(r=>{ if(r.principal_email)supEmails.add(r.principal_email.toLowerCase());
                      if(r.co_email)supEmails.add(r.co_email.toLowerCase()); });
    const newSups=[...supEmails].filter(e=>!S.supervisors.some(u=>(u.email||"").toLowerCase()===e));
    preview.append(el("strong",{},rows.length+" student row"+(rows.length===1?"":"s")+" ready."));
    if(missing) preview.append(" "+missing+" row(s) missing a name or ID will be skipped.");
    if(newSups.length) preview.append(el("div",{style:"margin-top:4px"},
      "New supervisors to be created from email: "+newSups.join(", ")));
  }
  input.onchange=()=>{
    const file=input.files[0]; if(!file)return;
    const r=new FileReader();
    r.onload=()=>{ rows=parseImport(r.result); refreshPreview(); };
    r.readAsText(file);
  };
  let pasteTimer=null;
  paste.addEventListener("input",()=>{ clearTimeout(pasteTimer);
    pasteTimer=setTimeout(()=>{ rows=parseImport(paste.value); refreshPreview(); },350); });

  modal("Import students — CSV or paste",
    el("div",{},
      el("p",{class:"muted",style:"margin-top:0"},
        "Upload a CSV or paste the allocation list per principal supervisor (copied from Excel). "+
        "Needed columns: student name, student ID, student email, principal supervisor (name), principal supervisor email, co-supervisor name, co-supervisor email. "+
        "Supervisors are matched by email — new ones are created automatically. Optional columns: mobile, campus, units (codes separated by ; or |), area."),
      el("div",{style:"margin-bottom:10px"},el("label",{},"Supervision area for this batch"),areaSel,
        el("p",{class:"muted",style:"margin:4px 0 0;font-size:13px"},"Applied to every imported student and any newly created supervisor. Add an \u201Carea\u201D column to mix IT and Business rows in one import.")),
      el("div",{style:"margin-bottom:8px"},el("label",{},"CSV file"),input),
      el("div",{},el("label",{},"Or paste rows"),paste),
      preview),
    async()=>{
      if(!rows.length){ toast("Choose a CSV file or paste rows first.",true); return false; }
      if(!S.activeSem){ toast("Create a semester first.",true); return false; }
      const units=unitsOf(sem);
      const existing=await DB.list("students",{semesterId:S.activeSem});
      const batchArea=areaSel.value;

      // find a supervisor by email; create a profile record if unknown
      async function ensureSupervisor(email,name,rowArea){
        email=(email||"").trim(); if(!email) return null;
        let u=S.supervisors.find(x=>(x.email||"").toLowerCase()===email.toLowerCase());
        if(u) return u;
        const profile={email,name:(name||"").trim()||email,role:"supervisor",supRole:"both",
          area:rowArea||batchArea,mobile:"",pendingLogin:true};
        const id=await DB.add("users",profile);
        u={id,...profile};
        S.supervisors.push(u);
        return u;
      }

      let added=0,updated=0;
      for(const row of rows){
        if(!row.name||!row.sid) continue;
        const rowArea=AREAS.find(a=>a.toLowerCase()===(row.area||"").trim().toLowerCase())||batchArea;
        let p=await ensureSupervisor(row.principal_email,row.principal_name,rowArea);
        let c=await ensureSupervisor(row.co_email,row.co_name,rowArea);
        if(p&&!canBePrincipal(p)) p=null;
        if(c&&!canBeCo(c)) c=null;
        const codes=(row.units||"").split(/[;|]/).map(x=>x.trim().toLowerCase()).filter(Boolean);
        const unitIds=units.filter(u=>codes.includes((u.code||"").toLowerCase())).map(u=>u.id);
        const sid=String(row.sid).trim();
        const data={
          semesterId:S.activeSem,sid,name:row.name.trim(),
          email:(row.email||"").trim(),mobile:(row.mobile||"").trim(),
          campus:(row.campus||"").trim()||"NSW",area:rowArea,
          principalUid:p?.id||"",coUid:c?.id||"",
          principalName:p?.name||p?.email||"",coName:c?.name||c?.email||""
        };
        const prev=existing.find(s=>String(s.sid).trim().toLowerCase()===sid.toLowerCase());
        if(prev){
          // keep existing unit enrolments unless the import supplies them
          await DB.update("students",prev.id,{...data,unitIds:unitIds.length?unitIds:(prev.unitIds||[])});
          updated++;
        } else {
          await DB.add("students",{...data,unitIds});
          added++;
        }
      }
      S.supervisors=(await DB.listUsers()).filter(u=>u.role==="supervisor");
      toast(`Imported ${added} new, updated ${updated} existing student${(added+updated)===1?"":"s"}.`);
      done(); return true;
    },"Import");
}

// Parse pasted or uploaded rows. Detects tab vs comma delimiter and maps
// header names by meaning ("Student Name", "Principal Supervisor Email",
// "Co-supervisor Email", etc — spacing, case and punctuation don't matter).
function parseImport(text){
  const lines=(text||"").replace(/\r/g,"").split("\n").filter(l=>l.trim().length);
  if(lines.length<2) return [];
  const delim=lines[0].includes("\t")?"\t":",";
  const split=l=>{
    if(delim==="\t") return l.split("\t").map(s=>s.trim());
    const out=[];let cur="",q=false;
    for(const ch of l){ if(ch==='"'){q=!q;} else if(ch===","&&!q){out.push(cur);cur="";} else cur+=ch; }
    out.push(cur); return out.map(s=>s.trim());
  };
  // normalise a header down to letters only, then map to a canonical key
  const canon=h=>{
    const k=h.toLowerCase().replace(/[^a-z]/g,"");
    if(/^(studentname|name|fullname)$/.test(k)) return "name";
    if(/^(studentid|sid|id|studentno|studentnumber)$/.test(k)) return "sid";
    if(/^(studentemail|email)$/.test(k)) return "email";
    if(/^(principalsupervisoremail|principalemail|supervisoremail)$/.test(k)) return "principal_email";
    if(/^(principalsupervisor|principalsupervisorname|principal|principalname|supervisor|supervisorname)$/.test(k)) return "principal_name";
    if(/^(cosupervisoremail|coemail)$/.test(k)) return "co_email";
    if(/^(cosupervisorname|cosupervisor|co|coname)$/.test(k)) return "co_name";
    if(k==="mobile"||k==="phone") return "mobile";
    if(k==="campus") return "campus";
    if(k==="units"||k==="unit") return "units";
    if(k==="area"||k==="supervisionarea"||k==="discipline") return "area";
    return k;
  };
  const headers=split(lines[0]).map(canon);
  return lines.slice(1).map(l=>{ const c=split(l); const o={}; headers.forEach((h,i)=>o[h]=c[i]??""); return o; });
}

/* ============================================================

async function viewTimetables(v){
  v.innerHTML="";
  const sem=activeSemester();
  v.append(el("div",{class:"section-title"},el("div",{},
    el("div",{class:"eyebrow ui"},"Weekly class · "+semUnitCodes(sem)),
    el("h2",{},S.role==="admin"?"Class timetables":"Class times"))));
  const bar=el("div",{class:"toolbar"}); bar.append(semesterPicker(()=>viewTimetables(v)));

  let myStudents=[];
  if(S.role==="admin"){
    bar.append(el("div",{style:"flex:1"}),
      el("button",{class:"btn",onclick:()=>timetableForm(null,()=>viewTimetables(v))},"+ Set class time"));
  } else {
    myStudents=(await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{}))
      .filter(s=>s.principalUid===S.uid||s.coUid===S.uid);
  }
  v.append(bar);
  if(S.role==="supervisor"){
    v.append(el("p",{class:"muted ui",style:"margin-top:-6px"},
      "Class times are set by the admin office. You see your own weekly class, and — for students you co-supervise — only the class run by that student's principal supervisor. Other supervisors' class groups are not shown."));
  }

  let tts=await DB.list("timetables", S.activeSem?{semesterId:S.activeSem}:{});

  if(S.role==="supervisor"){
    tts=classSlotsFor(tts,myStudents);
    if(!tts.length){
      v.append(emptyState("No class times yet",
        "Admin sets the weekly class times. Once a class is set for you, or by the principal supervisor of a student you co-supervise, it will show here."));
      return;
    }
  } else {
    if(!tts.length){ v.append(emptyState("No class times set","Use “+ Set class time” to create the weekly class slot for a unit and supervisor.")); return; }
  }

  const card=el("div",{class:"card",style:"padding:0;overflow:hidden"});
  const showRoleCol = S.role==="supervisor";
  const t=el("table",{});
  t.append(el("thead",{},el("tr",{},...["Unit","Supervisor",...(showRoleCol?["For you"]:[]),"Day","Time","Room / Campus","Status",""].map(h=>el("th",{},h)))));
  const tb=el("tbody",{});
  tts.sort((a,b)=>DAYS.indexOf(a.day)-DAYS.indexOf(b.day));
  for(const tt of tts){
    const unit=unitById(sem,tt.unitId);
    const isOwn = S.role==="supervisor" && tt.supervisorUid===S.uid;
    const actions=el("div",{class:"row"});
    if(S.role==="supervisor"){
      // supervisors never edit class times — admin only
      actions.append(el("span",{class:"muted ui",style:"font-size:12.5px"},"Set by admin"));
    }
    if(S.role==="admin"){
      if(tt.status!=="approved") actions.append(el("button",{class:"btn sm",onclick:async()=>{await DB.update("timetables",tt.id,{status:"approved"});toast("Approved.");viewTimetables(v);}},"Approve"));
      else actions.append(el("button",{class:"btn ghost sm",onclick:async()=>{await DB.update("timetables",tt.id,{status:"pending"});viewTimetables(v);}},"Unapprove"));
      // admin may edit & delete any class time
      actions.append(el("button",{class:"btn ghost sm",onclick:()=>timetableForm(tt,()=>viewTimetables(v))},"Edit"),
        el("button",{class:"btn danger sm",onclick:()=>confirmDelete("timetables",tt.id,"this class time",()=>viewTimetables(v))},"Delete"));
    }
    const roleCell = showRoleCol
      ? el("td",{}, isOwn?el("span",{class:"pill held"},"Your class"):el("span",{class:"pill blue"},"Co-student"))
      : null;
    tb.append(el("tr",{},
      el("td",{},el("strong",{},unit?.code||"—")),
      el("td",{},supName(tt.supervisorUid)),
      ...(roleCell?[roleCell]:[]),
      el("td",{},tt.day),
      el("td",{},`${tt.start}–${tt.end}`),
      el("td",{},tt.room||"—"),
      el("td",{},statusPill(tt.status)),
      el("td",{},actions)));
  }
  t.append(tb); card.append(t); v.append(card);
}
function statusPill(s){ const cls=s==="approved"?"approved":s==="pending"?"pending":"none";
  return el("span",{class:"pill "+cls},s==="approved"?"Approved":s==="pending"?"Awaiting admin":"—"); }

      (u.name||u.email)+(u.area?" ("+u.area+")":""))));
