/* ============================================================
   7b. WEEK PLANNER / MY WEEK  (new)
   One combined day-by-day view of everything recurring: class times
   plus every student consultation. Supervisors see their own classes,
   the principal's class for co-supervised students, and the
   consultations of all students they principal- or co-supervise.
   Admin sees the whole program. If the semester has a start date and
   we're inside teaching weeks, the CURRENT week's one-off time
   changes are applied so the planner shows what actually happens
   this week. Everything can be downloaded as an .ics calendar file.
   ============================================================ */
async function viewSchedule(v){
  v.innerHTML="";
  const sem=activeSemester();
  const weeks=sem?.weeks||12;
  const cw=currentWeekOf(sem);
  v.append(el("div",{class:"section-title"},el("div",{},
    el("div",{class:"eyebrow ui"},"Classes & consultations, day by day"+(cw?" · week "+cw+" of "+weeks:"")),
    el("h2",{},S.role==="admin"?"Week planner":"My week"))));
  const bar=el("div",{class:"toolbar"}); bar.append(semesterPicker(()=>viewSchedule(v)));
  v.append(bar);

  const students=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});
  let tts=await DB.list("timetables", S.activeSem?{semesterId:S.activeSem}:{});
  let cons=await DB.list("consultations", S.activeSem?{semesterId:S.activeSem}:{});

  if(S.role==="supervisor"){
    const mine=students.filter(s=>s.principalUid===S.uid||s.coUid===S.uid);
    tts=classSlotsFor(tts,mine);                    // same visibility rule as the class-times tab
    const ids=new Set(mine.map(s=>s.id));
    cons=cons.filter(c=>ids.has(c.studentDocId));
  } else {
    tts=tts.filter(t=>t.status==="approved");
  }

  const items=[];
  tts.forEach(t=>{
    const u=unitById(sem,t.unitId);
    items.push({day:t.day,start:t.start,end:t.end,type:"class",
      label:(u?.code||"Class")+" — weekly class",
      sub:supName(t.supervisorUid)+(t.room?" · "+t.room:"")});
  });
  cons.forEach(c=>{
    const s=students.find(x=>x.id===c.studentDocId); if(!s) return;
    // in the current teaching week, show that week's (possibly changed) time
    const et=cw?weekTime(c,cw):{day:c.day,start:c.start,end:c.end,mode:c.mode,link:c.meetingLink,overridden:false};
    if(!et.day||!et.start) return;   // default slot with no time this week \u2014 nothing to place on the grid
    const asCo=S.role==="supervisor" && s.coUid===S.uid && s.principalUid!==S.uid;
    items.push({day:et.day,start:et.start,end:et.end,type:"consult",
      label:"Consultation — "+s.name,
      sub:(et.mode||"")+(asCo?" · you co-supervise ("+(s.principalName||"principal")+" leads)"
                        :S.role==="admin"?(s.principalName?" · "+s.principalName:""):""),
      link:et.link, changed:!!et.overridden});
  });

  if(!items.length){
    v.append(emptyState("Nothing scheduled yet","Class times and consultation times will appear here once they are set."));
    return;
  }

  v.append(el("div",{class:"row",style:"margin-bottom:14px"},
    el("button",{class:"btn",onclick:()=>downloadScheduleICS(items,sem)},"⤓ Add to calendar (.ics)"),
    el("button",{class:"btn ghost",onclick:()=>window.print()},"Print / PDF"),
    cw?el("span",{class:"pill blue"},"Showing week "+cw+"'s times (one-off changes applied)")
      :el("span",{class:"muted ui",style:"font-size:13px"},
        "Recurring times shown."+(S.role==="admin"?" Set a semester start date (Semesters & staff) to track the current week.":""))));

  const wrap=el("div",{class:"weekgrid"});
  DAYS.forEach(d=>{
    const dayItems=items.filter(i=>i.day===d).sort((a,b)=>(a.start||"").localeCompare(b.start||""));
    if(!dayItems.length && (d==="Saturday"||d==="Sunday")) return;   // skip empty weekend columns
    const col=el("div",{class:"card daycol"});
    col.append(el("div",{class:"dayhead"},d));
    if(!dayItems.length) col.append(el("div",{class:"muted ui",style:"font-size:13px"},"Nothing scheduled"));
    dayItems.forEach(i=>{
      const b=el("div",{class:"slot "+i.type});
      b.append(el("div",{class:"slot-time ui"},`${i.start||"?"}–${i.end||"?"}`,
        i.changed?el("span",{class:"pill blue",style:"font-size:10.5px;margin-left:6px"},"changed this week"):""));
      b.append(el("div",{class:"slot-label"},i.label));
      if(i.sub) b.append(el("div",{class:"slot-sub muted ui"},i.sub));
      if(i.link) b.append(el("div",{style:"margin-top:4px"},
        el("a",{class:"linkpill",href:i.link,target:"_blank",rel:"noopener"},"Join")));
      col.append(b);
    });
    wrap.append(col);
  });
  v.append(wrap);
  v.append(el("p",{class:"muted ui",style:"margin-top:12px;font-size:13px"},
    "Teal = weekly class · blue = student consultation. The .ics download adds every recurring slot to Outlook, Google or Apple Calendar for the whole semester."));
}

// Build a weekly-recurring .ics calendar for the given schedule items.
// First occurrence: the item's weekday on/after the semester start date
// (or on/after today when no start date is set); repeats for `weeks` weeks.
function downloadScheduleICS(items,sem){
  const weeks=sem?.weeks||12;
  const pad=n=>String(n).padStart(2,"0");
  const esc=s=>String(s||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");
  let base=sem?.start?new Date(sem.start+"T00:00:00"):new Date();
  if(isNaN(base.getTime())) base=new Date();
  const L=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//MRes Supervision Hub//EN","CALSCALE:GREGORIAN"];
  items.forEach((it,i)=>{
    const target=DAYS.indexOf(it.day)+1; if(target<1) return;  // Monday=1 … Saturday=6
    const d=new Date(base); d.setHours(0,0,0,0);
    while((d.getDay()||7)!==target) d.setDate(d.getDate()+1);
    const ds=""+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());
    const st=(it.start||"09:00").replace(":","")+"00";
    const en=(it.end||"10:00").replace(":","")+"00";
    L.push("BEGIN:VEVENT",
      "UID:sh-"+i+"-"+ds+"-"+st+"@supervisionhub",
      "DTSTART:"+ds+"T"+st,
      "DTEND:"+ds+"T"+en,
      "RRULE:FREQ=WEEKLY;COUNT="+weeks,
      "SUMMARY:"+esc(it.label));
    if(it.sub) L.push("DESCRIPTION:"+esc(it.sub));
    if(it.link) L.push("URL:"+esc(it.link));
    L.push("END:VEVENT");
  });
  L.push("END:VCALENDAR");
  const blob=new Blob([L.join("\r\n")],{type:"text/calendar"});
  const fname=`supervision_schedule_${(sem?.label||"export").replace(/\s+/g,"_")}.ics`;
  const a=el("a",{href:URL.createObjectURL(blob),download:fname});
  document.body.append(a); a.click(); a.remove();
  toast("Calendar file downloaded — open it to add the semester to your calendar.");
}

/* ============================================================
   8. CONSULTATIONS TAB
   The PRINCIPAL supervisor sets ONE recurring consultation time +
   meeting link per allocated student. No admin approval needed —
   times can change week to week (handled in the Attendance tab).
   ============================================================ */
async function viewConsultations(v){
  v.innerHTML="";
  const sem=activeSemester();
  const weeks=sem?.weeks||12;
  // capability check: a co-supervisor-only account can never set times here
  const meSup=S.supervisors.find(u=>u.id===S.uid);
  const coOnly=S.role==="supervisor" && capOf(meSup)==="co";
  v.append(el("div",{class:"section-title"},el("div",{},
    el("div",{class:"eyebrow ui"},"Per-student supervision · used for attendance"),
    el("h2",{},S.role==="admin"?"Consultation times":coOnly?"View consultation times":"Set consultation time"))));
  const bar=el("div",{class:"toolbar"}); bar.append(semesterPicker(()=>viewConsultations(v)));
  v.append(bar);
  v.append(el("p",{class:"muted ui",style:"margin-top:-6px"},
    S.role==="admin"
      ? "The principal supervisor sets a recurring consultation time and the student's Teams-classroom channel link for each allocated student. This time is what weekly attendance is recorded against — no admin sign-off needed. Use the Attendance tab to change a single week or to record attendance."
      : coOnly
      ? "As co-supervisor you VIEW here — the consultation time and the student's Teams-classroom channel are set by each student's principal supervisor. What you see is the current timetable, plus each student's attendance so far. The full week-by-week record is on the Attendance tab."
      : "Set the recurring consultation time for each student here — this time is what weekly ATTENDANCE is recorded against (Attendance tab). The meeting is held in the Team classroom, in the student's own channel; paste that channel's link below. Only the PRINCIPAL supervisor sets the time. For students you co-supervise, the time and current attendance are shown read-only."));

  let students=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});
  // A supervisor sees students they supervise EITHER as principal or as co.
  // They can only set/edit the time as principal; as co they see it read-only.
  if(S.role==="supervisor") students=students.filter(s=>s.principalUid===S.uid||s.coUid===S.uid);
  let cons=await DB.list("consultations", S.activeSem?{semesterId:S.activeSem}:{});
  if(!students.length){
    v.append(emptyState(S.role==="supervisor"?"No students assigned to you":"No students yet",
      S.role==="supervisor"?"You'll see consultation times for students you principal- or co-supervise here.":"Add students first."));
    return;
  }

  const showRole = S.role==="supervisor";
  // sort so a supervisor's principal students come first, then co
  if(showRole) students.sort((a,b)=>(a.principalUid===S.uid?0:1)-(b.principalUid===S.uid?0:1));

  // Which teaching week we're in — highlighted in the per-student week table.
  const curWeek=currentWeekOf(sem);

  // Expand / collapse every student's week timetable at once.
  S.openWeeks=S.openWeeks||{};
  const withCons=students.map(s=>cons.find(x=>x.studentDocId===s.id && x.supervisorUid===s.principalUid)).filter(Boolean);
  if(withCons.length){
    const allOpen=withCons.every(c=>S.openWeeks[c.id]);
    v.append(el("div",{class:"row",style:"margin:2px 0 12px;gap:10px;align-items:center;flex-wrap:wrap"},
      el("button",{class:"btn ghost sm",onclick:()=>{
        withCons.forEach(c=>{ S.openWeeks[c.id]=!allOpen; });
        viewConsultations(v);
      }},allOpen?"\u25B4 Collapse all week timetables":"\u25BE Expand all week timetables"),
      el("span",{class:"muted ui",style:"font-size:12.5px"},
        "Shows every week of the semester per student \u2014 the time that week, whether it was changed, and what was recorded."+
        (curWeek?" You are in week "+curWeek+".":""))));
  }

  // Card per student instead of a dense table: the day/time reads as a
  // "ticket", unset rows are amber-flagged with a prominent Set-time CTA,
  // and attendance shows as a mini progress bar.
  const listEl=el("div",{class:"consult-list"});
  for(const s of students){
    const c=cons.find(x=>x.studentDocId===s.id && x.supervisorUid===s.principalUid);
    const isPrincipal=S.role==="supervisor" && s.principalUid===S.uid;
    const isCo  =S.role==="supervisor" && s.coUid===S.uid && !isPrincipal;
    const isAdmin=S.role==="admin";
    // The per-student consultation time belongs to the PRINCIPAL supervisor.
    // A co-supervisor cannot set or edit it here.
    const canEdit = isPrincipal || isAdmin;
    const st=c?consultStats(c,weeks):null;
    const scheduled=!!(c&&c.day);   // a record may exist as a "default slot" with no fixed time
    let changedWeeks=0;
    if(c) for(let w=1;w<=weeks;w++) if(weekTime(c,w).overridden) changedWeeks++;

    const card=el("div",{class:"ccard"+(scheduled?"":" unset")});

    // --- identity block ---
    const idBlock=el("div",{class:"cid"});
    const nameRow=el("div",{class:"row",style:"gap:7px;align-items:center"},
      el("strong",{class:"cname"},s.name), areaPill(s.area));
    if(showRole) nameRow.append(s.principalUid===S.uid
      ? el("span",{class:"pill held"},"Principal")
      : el("span",{class:"pill blue"},"Co-supervisor"));
    idBlock.append(nameRow,
      el("div",{class:"muted ui",style:"font-size:12.5px;margin-top:3px"},
        (s.campus||"\u2014")+(s.sid?" \u00B7 "+s.sid:"")+
        " \u00B7 Principal: "+(s.principalName||"\u2014")+(s.coName?" \u00B7 Co: "+s.coName:"")));
    card.append(idBlock);

    // --- time "ticket" ---
    const timeBlock=el("div",{class:"ctime"});
    if(scheduled){
      timeBlock.append(
        el("div",{class:"cday ui"},c.day),
        el("div",{class:"chrs ui"},c.start+"\u2013"+c.end),
        el("div",{class:"muted ui",style:"font-size:11.5px"},c.mode||""));
    } else if(c){
      timeBlock.append(
        el("div",{class:"cday ui",style:"color:var(--amber)"},"Default slot"),
        el("div",{class:"muted ui",style:"font-size:11.5px"},"any day, Mon\u2013Sun"));
    } else {
      timeBlock.append(
        el("div",{class:"cday ui",style:"color:var(--amber)"},"No time"),
        el("div",{class:"muted ui",style:"font-size:11.5px"},"not set yet"));
    }
    card.append(timeBlock);

    // --- detail: channel link + attendance bar ---
    const detail=el("div",{class:"cdetail"});
    detail.append(c?.meetingLink
      ? el("a",{class:"linkpill",href:c.meetingLink,target:"_blank",rel:"noopener"},"Open Teams channel")
      : el("span",{class:"muted ui",style:"font-size:12.5px"},c?"No channel link set":"\u2014"));
    if(changedWeeks) detail.append(el("span",{class:"pill blue",style:"font-size:11px;margin-left:8px"},
      changedWeeks+" week"+(changedWeeks===1?"":"s")+" changed"));
    if(st && st.held){
      const pct=Math.round(st.attended/st.held*100);
      detail.append(el("div",{class:"attmini"},
        el("div",{class:"attbar"},el("div",{class:"fill"+(pct<70?" low":""),style:"width:"+pct+"%"})),
        el("span",{class:"ui"},st.attended+"/"+st.held+" attended \u00B7 "+pct+"%"+(st.missed?" \u00B7 "+st.missed+" missed":""))));
    } else {
      detail.append(el("div",{class:"muted ui",style:"font-size:12.5px;margin-top:6px"},"No attendance recorded yet"));
    }
    card.append(detail);

    // --- actions ---
    const actions=el("div",{class:"cact"});
    if(canEdit){
      actions.append(el("button",{class:scheduled?"btn ghost sm":"btn sm",
        onclick:()=>consultForm(s,c,()=>viewConsultations(v))}, scheduled?"Edit time / link":"\uFF0B Set time"));
      if(c) actions.append(el("button",{class:"btn ghost sm",
        onclick:()=>weekPickThenOverride(c,()=>viewConsultations(v))},"Update Selected Weeks"));
      if(c) actions.append(el("button",{class:"btn danger sm",
        onclick:()=>confirmDelete("consultations",c.id,"this consultation",()=>viewConsultations(v))},"Delete"));
      if(s.coUid) actions.append(el("button",{class:"btn ghost sm",
        title:coSupEmail(s.coUid)?("Email "+(s.coName||supName(s.coUid))):"No email on file for the co-supervisor",
        onclick:()=>emailCoSupervisors(students,cons,weeks,s)},"\u2709 Email co-supervisor"));
      actions.append(el("button",{class:"btn ghost sm",
        title:s.mobile?("Text "+s.mobile):"No mobile number on file for this student",
        ...(s.mobile?{}:{disabled:"disabled"}),
        onclick:()=>openSMS(s.mobile, c&&c.day
          ? "Hi "+(s.name||"")+", reminder: your consultation is "+c.day+" "+c.start+"\u2013"+c.end
            +(c.mode?" ("+c.mode+")":"")+(c.meetingLink?" \u2014 "+c.meetingLink:"")+". \u2014 "+(s.principalName||"")
          : "Hi "+(s.name||"")+", regarding your supervision consultation: ")},
        "\uD83D\uDCAC Text reminder"));
    } else if(isCo){
      actions.append(el("span",{class:"muted ui",style:"font-size:12.5px"},"Set by principal"));
    }

    // --- full week timetable: expand / collapse (everyone who can see the
    //     card, principal and co-supervisor alike) ---
    let panel=null;
    if(c){
      const open=S.openWeeks && S.openWeeks[c.id];
      const toggle=el("button",{class:"btn ghost sm","aria-expanded":open?"true":"false"},
        (open?"\u25B4 Hide":"\u25BE Show")+" all "+weeks+" weeks");
      panel=el("div",{style:"grid-column:1/-1"+(open?"":";display:none")});
      // Re-render the tab after a week is saved so both the card summary
      // ("N weeks changed") and the table pick up the new time. The panel
      // stays open because S.openWeeks persists across the re-render.
      const afterSave=()=>viewConsultations(v);
      if(open) panel.append(weekTable(c,weeks,curWeek,canEdit,afterSave));
      toggle.onclick=()=>{
        S.openWeeks=S.openWeeks||{};
        const nowOpen=!S.openWeeks[c.id];
        S.openWeeks[c.id]=nowOpen;
        toggle.textContent=(nowOpen?"\u25B4 Hide":"\u25BE Show")+" all "+weeks+" weeks";
        toggle.setAttribute("aria-expanded",nowOpen?"true":"false");
        panel.style.display=nowOpen?"":"none";
        if(nowOpen && !panel.children.length) panel.append(weekTable(c,weeks,curWeek,canEdit,afterSave));
      };
      actions.append(toggle);
    }
    card.append(actions);
    if(panel) card.append(panel);
    listEl.append(card);
  }
  v.append(listEl);

  // --- bulk: email every co-supervisor their students' consultation details ---
  if(!coOnly){
    const editable = students.filter(s=>(S.role==="admin"||s.principalUid===S.uid) && s.coUid);
    if(editable.length){
      const withMail=new Set(editable.filter(s=>coSupEmail(s.coUid)).map(s=>s.coUid));
      const actionBar=el("div",{class:"toolbar",style:"margin-top:14px"},
        el("button",{class:"btn",...(withMail.size?{}:{disabled:"disabled"}),
          onclick:()=>emailCoSupervisors(editable,cons,weeks,null)},
          "\u2709 Email consultation times to all co-supervisors"),
        el("span",{class:"muted ui",style:"font-size:12.5px"},
          withMail.size
            ? withMail.size+" co-supervisor"+(withMail.size===1?"":"s")+" across "+editable.length+" student"+(editable.length===1?"":"s")+" — personalised or one combined email."
            : "No email addresses on file for these co-supervisors."));
      v.append(actionBar);
    }
  }

  if(S.role==="supervisor" && !coOnly && students.some(s=>s.coUid===S.uid && s.principalUid!==S.uid)){
    v.append(el("p",{class:"muted ui",style:"margin-top:10px"},
      "As co-supervisor you see the consultation time set by the principal and the student's current attendance. The full week-by-week record is on the Attendance tab (read-only for you)."));
  }
}

/* ------------------------------------------------------------
   8b. EMAIL CO-SUPERVISORS (from the Consultation times tab)
   Builds a personalised message per student — the recurring day /
   time / mode, the Teams channel link and the attendance so far —
   and hands it to the device's mail app via mailto:. Two modes:
     · one student  -> a single personalised email to that co-sup
     · all students -> either one personalised email per co-supervisor
                       (opened one at a time) or a single combined
                       digest to everyone in BCC.
   Nothing is sent by the app itself; the user taps send.
   ------------------------------------------------------------ */
function coSupEmail(uid){ const u=S.supervisors.find(x=>x.id===uid); return u?.email||""; }

// One student's consultation details rendered as plain text.
function consultBlock(s,c,weeks){
  const st=c?consultStats(c,weeks):null;
  const L=[];
  L.push("• "+(s.name||"Student")+(s.sid?" ("+s.sid+")":""));
  L.push("  Campus: "+(s.campus||"—")+"   Area: "+(s.area||"—"));
  L.push("  Principal supervisor: "+(s.principalName||"—"));
  if(c&&c.day) L.push("  Consultation: "+c.day+" "+c.start+"–"+c.end+(c.mode?" ("+c.mode+")":""));
  else if(c)   L.push("  Consultation: default slot — no fixed day/time set yet");
  else         L.push("  Consultation: not set yet");
  if(c?.meetingLink) L.push("  Teams channel: "+c.meetingLink);
  if(st&&st.held) L.push("  Attendance so far: "+st.attended+" of "+st.held+" meetings attended ("
    +Math.round(st.attended/st.held*100)+"%)"+(st.missed?", "+st.missed+" missed":""));
  else L.push("  Attendance so far: nothing recorded yet");
  return L.join("\n");
}

// Group students by their co-supervisor: [{uid,name,email,rows:[{s,c}]}]
function groupByCo(students,cons){
  const map=new Map();
  for(const s of students){
    if(!s.coUid) continue;
    const c=cons.find(x=>x.studentDocId===s.id && x.supervisorUid===s.principalUid)||null;
    if(!map.has(s.coUid)) map.set(s.coUid,{uid:s.coUid,name:s.coName||supName(s.coUid),email:coSupEmail(s.coUid),rows:[]});
    map.get(s.coUid).rows.push({s,c});
  }
  return [...map.values()].sort((a,b)=>String(a.name).localeCompare(String(b.name)));
}

// Modal: email the co-supervisor(s) about consultation times.
// `only` = a single student object, or null for "all my students".
function emailCoSupervisors(students,cons,weeks,only){
  const sem=activeSemester();
  const scoped = only ? students.filter(s=>s.id===only.id) : students;
  const groups = groupByCo(scoped,cons);
  if(!groups.length){ toast(only?"No co-supervisor assigned to this student.":"None of these students has a co-supervisor.",true); return; }

  const withEmail = groups.filter(g=>g.email);
  const noEmail   = groups.filter(g=>!g.email);
  if(!withEmail.length){ toast("No email on file for "+(only?"this co-supervisor.":"any co-supervisor."),true); return; }

  const style=el("select",{},
    el("option",{value:"each"},"Personalised — one email per co-supervisor ("+withEmail.length+")"),
    el("option",{value:"one"},"One combined email to all co-supervisors (BCC)"));
  const subject=el("input",{value:"Consultation times — "+(sem?.label||"this semester")});
  const intro=el("textarea",{style:"min-height:90px",value:
    "Hello,\n\nHere are the current consultation arrangements for the student(s) you co-supervise. "+
    "The times below are what weekly attendance is recorded against — please let me know if any of them clash with your teaching.\n"});
  const sign=el("input",{value:(S.supervisors.find(u=>u.id===S.uid)?.name)||"",placeholder:"Your name (sign-off)"});
  const preview=el("pre",{class:"muted ui",style:"white-space:pre-wrap;font-size:12px;max-height:190px;overflow:auto;background:rgba(127,127,127,.08);padding:10px;border-radius:8px;margin:0"});
  const note=el("p",{class:"muted",style:"margin:0"});

  function bodyFor(g){
    return (intro.value||"")+"\n"+
      g.rows.map(r=>consultBlock(r.s,r.c,weeks)).join("\n\n")+
      "\n\nRecorded in the MRes Supervision Hub"+(sem?.label?" · "+sem.label:"")+
      (sign.value?"\n\n— "+sign.value:"");
  }
  function combinedBody(){
    return (intro.value||"")+"\n"+
      groups.filter(g=>g.email).map(g=>
        "── "+g.name+" ──\n"+g.rows.map(r=>consultBlock(r.s,r.c,weeks)).join("\n\n")).join("\n\n")+
      "\n\nRecorded in the MRes Supervision Hub"+(sem?.label?" · "+sem.label:"")+
      (sign.value?"\n\n— "+sign.value:"");
  }
  function refresh(){
    if(style.value==="one"){
      note.textContent="One email to "+withEmail.length+" co-supervisor"+(withEmail.length===1?"":"s")+" in BCC, covering "+scoped.filter(s=>s.coUid).length+" student(s).";
      preview.textContent="To (BCC): "+withEmail.map(g=>g.email).join(", ")+"\nSubject: "+subject.value+"\n\n"+combinedBody();
    } else {
      note.textContent=withEmail.length+" personalised email"+(withEmail.length===1?"":"s")+" — your mail app opens once per co-supervisor.";
      preview.textContent=withEmail.map(g=>"To: "+g.email+"\nSubject: "+subject.value+"\n\n"+bodyFor(g)).join("\n\n──────────\n\n");
    }
    if(noEmail.length) note.textContent+="  ·  "+noEmail.length+" skipped (no email on file: "+noEmail.map(g=>g.name).join(", ")+").";
  }
  style.onchange=refresh; subject.oninput=refresh; intro.oninput=refresh; sign.oninput=refresh;
  refresh();
  if(only) style.value="each", style.disabled=true;

  modal(only?("Email co-supervisor — "+only.name):"Email consultation times to co-supervisors",
    el("div",{class:"grid"},
      el("div",{},el("label",{},"Send as"),style),
      el("div",{},el("label",{},"Subject"),subject),
      el("div",{},el("label",{},"Opening message"),intro),
      el("div",{},el("label",{},"Sign off as"),sign),
      el("div",{},el("label",{},"Preview"),preview),
      note,
      el("p",{class:"muted",style:"margin:0"},
        "Each student's day, time, mode, Teams channel link and attendance so far are added automatically. This opens your device's mail app with everything pre-filled — review and tap send there; the hub does not send email itself.")),
    async()=>{
      if(style.value==="one"){
        const me=S.supervisors.find(u=>u.id===S.uid);
        window.location.href="mailto:"+encodeURIComponent(me?.email||"")
          +"?bcc="+encodeURIComponent(withEmail.map(g=>g.email).join(","))
          +"&subject="+encodeURIComponent(subject.value||"")
          +"&body="+encodeURIComponent(combinedBody());
        toast("Opening mail app with "+withEmail.length+" co-supervisor(s) in BCC.");
      } else {
        // open one mail draft per co-supervisor, spaced so the OS handler keeps up
        withEmail.forEach((g,i)=>setTimeout(()=>{
          openEmail(g.email,subject.value,bodyFor(g));
        }, i*900));
        toast(withEmail.length===1?"Opening mail app…":"Opening "+withEmail.length+" drafts, one at a time…");
      }
      return true;
    },"Open mail app");
}

/* ------------------------------------------------------------
   8c. FULL WEEK TIMETABLE (expand / collapse on each card)
   Principals and co-supervisors both need to see every week at a
   glance — the recurring slot is only half the story once single
   weeks have been moved. This lists week 1..N with the effective
   time for that week, flags the ones that were changed, and shows
   what was recorded against each.
   ------------------------------------------------------------ */
function weekStatusPill(l){
  if(l.held===true){
    if(l.studentAttended===true) return el("span",{class:"pill held",style:"font-size:11px"},"Attended");
    if(l.studentAttended===false) return el("span",{class:"pill missed",style:"font-size:11px"},"Missed");
    return el("span",{class:"pill none",style:"font-size:11px"},"Held");
  }
  if(l.held===false) return el("span",{class:"pill none",style:"font-size:11px"},"Not held");
  return el("span",{class:"pill none",style:"font-size:11px",title:"Nothing recorded for this week yet"},"\u2014");
}

// Builds the week-by-week table for one consultation.
// `canEdit` adds a per-row Edit button that opens the same single-week
// override form as "Update Selected Weeks", but jumps straight to that
// week instead of asking which one. `onSaved` re-renders the caller.
function weekTable(c,weeks,curWeek,canEdit,onSaved){
  const wrap=el("div",{class:"wktable",style:"margin-top:10px;border:1px solid var(--line);border-radius:10px;overflow:auto"});
  const t=el("table",{style:"width:100%;font-size:13px"});
  const heads=["Week","Day","Time","Mode","Status","Co-sup","Note"];
  if(canEdit) heads.push("");
  t.append(el("thead",{},el("tr",{},...heads.map(h=>el("th",{style:"font-size:11.5px"},h)))));
  const tb=el("tbody",{});
  for(let w=1;w<=weeks;w++){
    const et=weekTime(c,w), l=weekLog(c,w);
    const isNow=(curWeek===w);
    const tr=el("tr",{style:isNow?"background:var(--blue-soft)":""});
    const wkCell=el("td",{style:"white-space:nowrap"},
      el("strong",{class:"ui"},"W"+w));
    if(isNow) wkCell.append(el("span",{class:"pill blue",style:"font-size:10.5px;margin-left:5px"},"now"));
    if(et.overridden) wkCell.append(el("span",{class:"pill pending",style:"font-size:10.5px;margin-left:5px",
      title:"This week's time was changed from the recurring slot"},"changed"));
    const coTxt=l.coAttended==="yes"?"Yes":l.coAttended==="no"?"No":l.coAttended==="na"?"n/a":"\u2014";
    tr.append(wkCell,
      el("td",{class:et.overridden?"":"muted"},et.day||"\u2014"),
      el("td",{class:et.overridden?"":"muted",style:"white-space:nowrap"},
        (et.start&&et.end)?et.start+"\u2013"+et.end:"\u2014"),
      el("td",{class:"muted"},et.mode||"\u2014"),
      el("td",{},weekStatusPill(l)),
      el("td",{class:"muted"},coTxt),
      el("td",{class:"muted",style:"font-size:12.5px"},l.comment||"\u2014"));
    if(canEdit){
      const cell=el("td",{style:"white-space:nowrap;text-align:right"});
      cell.append(el("button",{class:"btn xs ghost",
        title:et.overridden?("Change or reset week "+w+"'s time"):("Set a one-off time for week "+w),
        onclick:()=>weekOverrideForm(c,w,onSaved)},
        et.overridden?"Edit":"\u270E Change"));
      tr.append(cell);
    }
    tb.append(tr);
  }
  t.append(tb); wrap.append(t);
  return wrap;
}

function consultForm(student,existing,done){
  const day=el("select",{},...DAYS.map(d=>el("option",{value:d,...(d===existing?.day?{selected:"selected"}:{})},d)));
  const start=el("input",{type:"time",value:existing?.start||"14:00"});
  const end=el("input",{type:"time",value:existing?.end||"14:30"});
  const mode=el("select",{},...["Online","In person","Hybrid"].map(m=>el("option",{value:m,...(m===existing?.mode?{selected:"selected"}:{})},m)));
  const link=el("input",{value:existing?.meetingLink||"",placeholder:"https://teams.microsoft.com/… (this student's channel in the Team classroom)"});
  modal((existing?"Edit":"Set")+" consultation time — "+student.name,
    el("div",{class:"grid",style:"grid-template-columns:1fr 1fr"},
      el("div",{style:"grid-column:1/-1"},el("p",{class:"muted",style:"margin:0"},
        "This recurring consultation time is used for ATTENDANCE: each week's meeting is recorded against it on the Attendance tab. The meeting is held in the Team classroom, using this student's own channel — paste that channel's link below. To change a single week's time, use the Attendance tab. No admin approval is required.")),
      el("div",{style:"grid-column:1/-1"},el("label",{},"Day of week"),day),
      el("div",{},el("label",{},"Start"),start),
      el("div",{},el("label",{},"End"),end),
      el("div",{style:"grid-column:1/-1"},el("label",{},"Mode"),mode),
      el("div",{style:"grid-column:1/-1"},el("label",{},"Student's Teams channel link (Team classroom)"),link)
    ),
    async()=>{
      if(start.value>=end.value){ toast("End must be after start.",true); return false; }
      if(!student.principalUid){ toast("Assign a principal supervisor to this student first (Students tab).",true); return false; }
      const data={
        semesterId:student.semesterId||S.activeSem, studentDocId:student.id,
        supervisorUid:student.principalUid, principalName:student.principalName||"",
        coUid:student.coUid||"", coName:student.coName||"",
        day:day.value, start:start.value, end:end.value, mode:mode.value,
        meetingLink:link.value.trim()
      };
      if(existing){ await DB.update("consultations",existing.id,data); }
      else { await DB.add("consultations",{...data, weeks:{}}); }
      toast("Consultation time saved."); done(); return true;
    });
}

/* ============================================================
   9. MEETING LOG TAB  (principal logs each week; admin views)
   Per student, per week: held? · student attended? · co attended?
   · optional time override · comment. Saved into consultations.weeks.
   ============================================================ */
async function viewMeetingLog(v){
  v.innerHTML="";
  const sem=activeSemester();
  const weeks=sem?.weeks||12;
  const cw=currentWeekOf(sem);
  // ---- Moodle-style editing window ----
  // ref: the week the window counts back from; backW: how many weeks back a
  // supervisor may still record (admin-set per semester; -1 = no limit).
  const ref=lockRefWeek(sem);
  const backW=(sem?.backWeeks===undefined||sem?.backWeeks===null||sem?.backWeeks==="")?2:parseInt(sem.backWeeks);
  function weekEditable(w){
    if(S.role!=="supervisor") return true;   // admin is never date-locked
    if(ref===null) return true;              // no start date -> no locking
    if(w>ref) return false;                  // future weeks not recordable
    if(backW<0) return true;                 // no limit
    return w>=ref-backW;
  }
  let selWeek=null;   // currently selected week (persists across student taps)
  let showAll=false;  // admin-only: full register
  v.append(el("div",{class:"section-title"},el("div",{},
    el("div",{class:"eyebrow ui"},"Weekly attendance register · "+weeks+" weeks"+(cw?" · now in week "+cw:"")),
    el("h2",{},"Attendance"))));
  const bar=el("div",{class:"toolbar"}); bar.append(semesterPicker(()=>viewMeetingLog(v)));
  v.append(bar);
  v.append(el("p",{class:"muted ui",style:"margin-top:-6px"},
    S.role==="supervisor"
      ? "Pick a student, choose the week, then tap to mark that week's consultation: held, student attended, co-supervisor attended. Weeks run Monday\u2013Sunday and you can record on any day of the week \u2014 even if no consultation time is set yet. You can go back as far as your admin allows; future weeks are locked. Co-supervised students are shown read-only."
      : "Read-only view of each student's weekly consultation attendance, recorded by the principal supervisor."));

  let students=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});
  // Supervisors see students they principal- OR co-supervise. The principal
  // records the log; a co-supervisor sees the same record read-only.
  if(S.role==="supervisor") students=students.filter(s=>s.principalUid===S.uid||s.coUid===S.uid);
  if(!students.length){
    v.append(emptyState("No students to log",
      S.role==="supervisor"?"You'll see the weekly record for students you principal- or co-supervise here.":"Add students first."));
    return;
  }
  let cons=await DB.list("consultations", S.activeSem?{semesterId:S.activeSem}:{});

  // Pick a student — tappable cards instead of a dropdown. One tap on a
  // phone, and each card doubles as a status chip: it shows the role you
  // hold for that student and whether THIS week still needs recording
  // (or the overall attendance rate when no semester start date is set).
  if(S.role==="supervisor") students.sort((a,b)=>(a.principalUid===S.uid?0:1)-(b.principalUid===S.uid?0:1));
  let selectedId=students[0].id;
  const cards=el("div",{class:"stupick"});
  const searchBox=el("input",{placeholder:"Filter by name, ID or campus…",style:"max-width:280px"});
  function cardStatus(s){
    const c=cons.find(x=>x.studentDocId===s.id && x.supervisorUid===s.principalUid);
    if(!c) return {cls:"pending",txt:"No time set"};
    if(cw){
      const l=weekLog(c,cw);
      if(l.held===true) return l.studentAttended===true ? {cls:"held",txt:"W"+cw+" ✓"}
                             : l.studentAttended===false ? {cls:"missed",txt:"W"+cw+" ✗"}
                             : {cls:"none",txt:"W"+cw+" held"};
      if(l.held===false) return {cls:"none",txt:"W"+cw+" not held"};
      return {cls:"pending",txt:"W"+cw+" to record"};
    }
    const st=consultStats(c,weeks);
    return st.held ? {cls:"held",txt:Math.round(st.attended/st.held*100)+"% attend"} : {cls:"none",txt:"No record yet"};
  }
  function drawCards(){
    cards.innerHTML="";
    const term=searchBox.value.trim().toLowerCase();
    students
      .filter(s=>!term||[s.name,s.sid,s.campus].some(x=>(x||"").toLowerCase().includes(term)))
      .forEach(s=>{
        const st=cardStatus(s);
        const roleTag = S.role==="supervisor" ? (s.principalUid===S.uid?"principal":"co-supervisor")
                                              : (s.principalName||"—");
        const b=el("button",{class:"stucard"+(s.id===selectedId?" active":""),
          onclick:()=>{ selectedId=s.id; drawCards(); renderStudent(s.id); }},
          el("span",{class:"nm"},s.name),
          el("span",{class:"mt ui"},s.campus+" · "+roleTag),
          el("span",{class:"pill "+st.cls,style:"font-size:11px"},st.txt));
        cards.append(b);
      });
    if(!cards.children.length) cards.append(el("span",{class:"muted ui",style:"padding:6px 0"},"No students match."));
  }
  searchBox.addEventListener("input",drawCards);
  if(students.length>6)
    v.append(el("div",{class:"field",style:"margin-bottom:8px"},el("label",{},"Find student"),searchBox));
  v.append(cards);

  const panel=el("div",{});
  v.append(panel);

  function consFor(studentId){
    const s=students.find(x=>x.id===studentId);
    return cons.find(c=>c.studentDocId===studentId && c.supervisorUid===s.principalUid);
  }

  async function renderStudent(studentId){
    panel.innerHTML="";
    const s=students.find(x=>x.id===studentId);
    let c=consFor(studentId);

    // summary strip
    const stats = c ? consultStats(c,weeks) : {held:0,attended:0,missed:0,logged:0};
    const strip=el("div",{class:"stat"},
      statBox(String(stats.held),"Meetings held"),
      statBox(String(stats.attended),"Student attended"),
      statBox(String(stats.missed),"Student missed"),
      statBox(stats.held?Math.round(stats.attended/stats.held*100)+"%":"—","Attendance rate"));
    // if we know the current week, surface how many past weeks are unrecorded
    if(cw && c){
      let unrec=0;
      for(let w=1;w<cw;w++){ const l=weekLog(c,w); if(l.held!==true&&l.held!==false) unrec++; }
      if(unrec) strip.append(statBox(String(unrec),"Past weeks unrecorded"));
    }
    panel.append(strip);

    // who can arrange/change the per-student meeting TIME & LINK
    // (principal or admin only — a co-supervisor uses their own diary instead)
    const canSetTime = (S.role==="supervisor" && s.principalUid===S.uid) || S.role==="admin";
    // who records ATTENDANCE each week (principal only; admin & co are read-only)
    const canEdit = (S.role==="supervisor" && s.principalUid===S.uid);

    if(!c){
      if(canEdit){
        // The PRINCIPAL can record attendance even before a consultation time
        // exists: we work against a "default slot" (any day, Mon\u2013Sun). The
        // record is created automatically the first time they save something.
        c={virtual:true, semesterId:S.activeSem||s.semesterId||"", studentDocId:s.id,
           supervisorUid:s.principalUid, coUid:s.coUid||"", coName:s.coName||"",
           day:"", start:"", end:"", mode:"", meetingLink:"", unscheduled:true, weeks:{}};
      } else {
        panel.append(el("div",{class:"card"},
          el("p",{class:"muted",style:"margin:0 0 10px"},
            "No consultation time or attendance record exists for "+s.name+" yet."),
          canSetTime
            ? el("button",{class:"btn",onclick:()=>consultForm(s,null,()=>renderStudentAfterReload(studentId))},"Set consultation time")
            : el("span",{class:"muted"},"The principal supervisor records attendance; nothing to show yet.")));
        return;
      }
    }
    const scheduled=!!c.day;   // false = default slot (no fixed time yet)

    // header card: recurring time + link
    const head=el("div",{class:"card",style:"margin-bottom:14px"});
    head.append(
      el("div",{class:"row",style:"justify-content:space-between;align-items:flex-start"},
        el("div",{},
          el("div",{class:"eyebrow ui"},scheduled
            ?"Recurring consultation (attendance is recorded against this time)"
            :"No fixed time \u2014 default weekly slot"),
          el("div",{style:"font-size:20px;font-weight:700"},scheduled?`${c.day} ${c.start}–${c.end}`:"Any day, Mon\u2013Sun"),
          el("div",{class:"muted ui",style:"margin-top:2px"},(c.mode||"")+(c.coName?" · Co-supervisor: "+c.coName:" · No co-supervisor"))),
        el("div",{class:"row"},
          c.meetingLink?el("a",{class:"linkpill",href:c.meetingLink,target:"_blank",rel:"noopener"},"Teams channel"):el("span",{class:"muted"},"No channel link set"),
          canSetTime?el("button",{class:scheduled?"btn ghost sm":"btn sm",
            onclick:()=>consultForm(s,c.virtual?null:c,()=>renderStudentAfterReload(studentId))},
            scheduled?"Edit time / link":"Set consultation time"):"")));
    if(!scheduled && canEdit)
      head.append(el("p",{class:"muted ui",style:"margin:8px 0 0;font-size:12.5px"},
        "You can record each week's meeting now and set a fixed time later \u2014 attendance is kept per week (Mon\u2013Sun), not per day, so record it on whichever day the meeting happened."));
    panel.append(head);

    // ---- one week at a time (Moodle-style): pick the week, then record ----
    if(selWeek==null) selWeek = cw || (ref&&ref>=1?Math.min(ref,weeks):1);
    selWeek=Math.min(Math.max(selWeek,1),weeks);

    const navRow=el("div",{class:"weeknav"});
    const wsel=el("select",{style:"width:auto;min-width:215px"});
    for(let w=1;w<=weeks;w++){
      const range=weekRangeLabel(sem,w);
      let suffix="";
      if(cw===w) suffix=" \u00B7 this week";
      else if(canEdit && !weekEditable(w)) suffix=(ref!==null&&w>ref)?" \u00B7 upcoming":" \u00B7 locked";
      wsel.append(el("option",{value:String(w),...(w===selWeek?{selected:"selected"}:{})},
        "Week "+w+(range?" \u00B7 "+range:"")+suffix));
    }
    wsel.onchange=()=>{ selWeek=parseInt(wsel.value); renderStudent(studentId); };
    navRow.append(
      el("button",{class:"btn ghost sm",...(selWeek<=1?{disabled:"disabled"}:{}),
        onclick:()=>{selWeek--;renderStudent(studentId);}},"\u2190"),
      wsel,
      el("button",{class:"btn ghost sm",...(selWeek>=weeks?{disabled:"disabled"}:{}),
        onclick:()=>{selWeek++;renderStudent(studentId);}},"\u2192"));
    if(cw && cw!==selWeek)
      navRow.append(el("button",{class:"btn sm",onclick:()=>{selWeek=cw;renderStudent(studentId);}},"This week"));
    panel.append(navRow);

    // week strip: whole-semester overview & quick navigation
    // (green = attended, red = missed, blue = held, grey = not held, dim = upcoming)
    const wstrip=el("div",{class:"wkstrip"});
    for(let w=1;w<=weeks;w++){
      const l=weekLog(c,w);
      let cls="";
      if(l.held===true&&l.studentAttended===true) cls="ok";
      else if(l.held===true&&l.studentAttended===false) cls="miss";
      else if(l.held===true) cls="heldsq";
      else if(l.held===false) cls="nh";
      if(ref!==null&&w>ref) cls+=" future";
      const range=weekRangeLabel(sem,w);
      wstrip.append(el("button",{class:"wksq "+cls+(w===selWeek?" sel":""),
        title:"Week "+w+(range?" \u00B7 "+range:""),
        onclick:()=>{selWeek=w;renderStudent(studentId);}},String(w)));
    }
    panel.append(wstrip);

    const log=el("div",{class:"weeklog"});
    if(S.role==="admin"&&showAll){
      for(let w=1;w<=weeks;w++) log.append(weekRow(c,s,w,canEdit,studentId));
    } else {
      log.append(weekRow(c,s,selWeek,canEdit,studentId));
    }
    panel.append(log);

    if(S.role==="admin"){
      const cb=el("input",{type:"checkbox",...(showAll?{checked:"checked"}:{})});
      cb.onchange=()=>{ showAll=cb.checked; renderStudent(studentId); };
      panel.append(el("label",{class:"row ui",style:"gap:8px;margin-top:10px;font-size:13.5px;cursor:pointer;align-items:center"},
        cb,"Show all weeks (full register)"));
    }

    if(!canEdit && S.role==="admin"){
      panel.append(el("p",{class:"muted ui",style:"margin-top:10px"},
        "Read-only for admin. To change times, links or the whole record, use Edit time / link above or the Consultations tab."));
    }
    if(!canEdit && S.role==="supervisor" && s.coUid===S.uid){
      panel.append(el("p",{class:"muted ui",style:"margin-top:10px"},
        "You co-supervise "+s.name+". The consultation time, Teams channel link and weekly attendance are set by the principal supervisor"+(s.principalName?" ("+s.principalName+")":"")+" and are shown to you read-only — this is the current timetable and attendance record for this student."));
    }
  }

  function weekRow(c,s,w,canEditRole,studentId){
    const unlocked=weekEditable(w);
    const canEdit=canEditRole&&unlocked;   // role permission AND inside the editing window
    const et=weekTime(c,w);
    const l=weekLog(c,w);
    const isNow=cw===w;
    const wk=el("div",{class:"wk"},el("div",{class:"num"},String(w)),el("div",{class:"lab"},isNow?"This wk":"Week"));
    const body=el("div",{class:"wbody"});

    // meta line: effective time + override marker
    const meta=el("div",{class:"wmeta"});
    meta.append(et.day
      ? el("span",{},`${et.day} ${et.start}–${et.end}`)
      : el("span",{class:"muted"},"No fixed time \u2014 any day this week"));
    const _rng=weekRangeLabel(sem,w);
    if(_rng) meta.append(el("span",{class:"muted"},"\u00B7 "+_rng));
    if(et.mode) meta.append(el("span",{},"· "+et.mode));
    if(et.overridden) meta.append(el("span",{class:"pill blue",style:"font-size:11.5px"},"Changed this week"));
    if(et.link) meta.append(el("a",{class:"linkpill",href:et.link,target:"_blank",rel:"noopener"},"Link"));
    if(canEdit && !c.virtual) meta.append(el("button",{class:"btn ghost xs",onclick:()=>weekOverrideForm(c,w,()=>renderStudentAfterReload(studentId))},
      et.overridden?"Edit this week":"Change time"));
    body.append(meta);

    // controls line
    const controls=el("div",{class:"row",style:"margin-top:8px;gap:14px"});

    // Held?
    controls.append(toggleGroup("Meeting held", l.held===true?"yes":l.held===false?"no":null,
      [["Held","yes","yes"],["Not held","no","no"]],
      canEdit, async(val)=>{
        const held = val==="yes";
        await patchWeek(c,w,{held});
        renderStudentAfterReload(studentId);
      }));

    // Student attended? (only meaningful if held)
    controls.append(toggleGroup("Student", l.studentAttended===true?"yes":l.studentAttended===false?"no":null,
      [["Attended","yes","yes"],["Absent","no","no"]],
      canEdit && l.held===true, async(val)=>{
        await patchWeek(c,w,{studentAttended: val==="yes"});
        renderStudentAfterReload(studentId);
      }));

    // Co-supervisor attended? (only if a co exists & held)
    if(c.coUid){
      controls.append(toggleGroup("Co-supervisor",
        l.coAttended==="yes"?"yes":l.coAttended==="no"?"no":l.coAttended==="na"?"na":null,
        [["Attended","yes","yes"],["Absent","no","no"],["N/A","na","na"]],
        canEdit && l.held===true, async(val)=>{
          await patchWeek(c,w,{coAttended: val});
          renderStudentAfterReload(studentId);
        }));
    }
    body.append(controls);

    // locked-week notice \u2014 only for the supervisor who could otherwise edit
    if(canEditRole && !unlocked){
      body.append(el("div",{class:"locknote ui"},
        (ref!==null && w>ref)
          ? "\uD83D\uDD12 This week hasn't started yet \u2014 recording opens in week "+w+"."
          : "\uD83D\uDD12 Editing window closed \u2014 your admin allows recording "+
            (backW===0?"the current week only":"up to "+backW+" week"+(backW===1?"":"s")+" back")+
            ". Ask admin to change earlier weeks."));
    }

    // Reset — clears this week's record (held / attendance / comment) so the
    // supervisor can fix a mistake. Only shown when there's something to clear.
    if(canEdit && Object.keys(l).length){
      const hasOverride=!!(l.day||l.start||l.end||l.mode||l.link);
      const resetRow=el("div",{class:"row",style:"margin-top:8px"});
      resetRow.append(el("button",{class:"btn ghost xs",onclick:()=>{
        modal("Reset week "+w+"?",
          el("p",{class:"muted",style:"margin:0"},
            "This clears the meeting record for week "+w+" (held status, attendance and comment), so you can record it again."+
            (hasOverride?" The changed time for this week will also be reset to the recurring time.":"")),
          async()=>{
            try{
              // Clearing = overwrite the week with an empty record.
              await DB.updateWeek(c.id, String(w), {});
              if(!c.weeks) c.weeks={};
              c.weeks[String(w)]={};
            }catch(err){
              console.error("week reset failed",err);
              toast("Couldn't reset — "+(err?.code||err?.message||"please try again."),true);
              return false;
            }
            toast("Week "+w+" reset."); renderStudentAfterReload(studentId); return true;
          },"Reset week");
        // tint the confirm button
        const b=document.querySelectorAll(".modal .btn"); b[b.length-1].classList.add("danger");
      }},"↺ Reset week "+w));
      body.append(resetRow);
    }

    // comment — saves automatically (debounced while typing, and on blur)
    if(canEdit){
      const ta=el("textarea",{placeholder:"Comment (optional) — e.g. progress, follow-ups, reason for absence"},l.comment||"");
      const status=el("span",{class:"muted ui",style:"font-size:12.5px;margin-left:8px"},"");
      let lastSaved=l.comment||"";
      let timer=null, saving=false;
      async function commit(){
        const val=ta.value.trim();
        if(val===lastSaved){ return; }      // nothing changed
        if(saving) return;
        saving=true; status.textContent="Saving…";
        try{
          await patchWeek(c,w,{comment:val}); // patchWeek updates the local copy too
          lastSaved=val; status.textContent="Saved";
          setTimeout(()=>{ if(status.textContent==="Saved") status.textContent=""; },1500);
        }catch(e){
          status.textContent="Not saved — check connection";
        }finally{ saving=false; }
      }
      ta.addEventListener("input",()=>{
        status.textContent="Editing…";
        clearTimeout(timer); timer=setTimeout(commit,900); // debounce
      });
      ta.addEventListener("blur",()=>{ clearTimeout(timer); commit(); });
      body.append(el("div",{class:"wcomment"},ta,
        el("div",{style:"margin-top:3px"},status)));
    } else if(l.comment){
      body.append(el("div",{class:"wcomment muted",style:"font-style:italic"},"\u201C"+l.comment+"\u201D"));
    }

    // status pill
    if(l.held===true){
      const sp = l.studentAttended===true ? el("span",{class:"pill held"},"Attended")
               : l.studentAttended===false ? el("span",{class:"pill missed"},"Missed")
               : el("span",{class:"pill none"},"Held");
      meta.prepend(sp);
    } else if(l.held===false){
      meta.prepend(el("span",{class:"pill none"},"Not held"));
    } else {
      meta.prepend(el("span",{class:"pill none"},"No record"));
    }

    return el("div",{class:"wrow"+(isNow?" now":"")},wk,body);
  }

  // persist a partial update to a single week, merging into that week's data.
  // Writes only the one nested key (weeks.<n>) so Firestore can't drop it.
  async function patchWeek(c,w,partial){
    // First write against a "default slot": create the consultation record
    // now (with no fixed time) so the week data has somewhere to live.
    if(c.virtual){
      try{
        const {virtual,weeks:_w,...data}=c;
        c.id=await DB.add("consultations",{...data,weeks:{}});
        delete c.virtual;
      }catch(err){
        console.error("auto-create consultation failed",err);
        toast("Couldn't create the attendance record \u2014 "+(err?.code||err?.message||"please try again."),true);
        throw err;
      }
    }
    const key=String(w);
    const prev=(c.weeks?.[key]) || (c.weeks?.[w]) || {};
    const merged={...prev,...partial};
    // strip undefined so Firestore doesn't choke
    Object.keys(merged).forEach(k=>merged[k]===undefined&&delete merged[k]);
    try{
      await DB.updateWeek(c.id, key, merged);
    }catch(err){
      console.error("patchWeek failed",err);
      toast("Couldn't save — "+(err?.code||err?.message||"please try again."),true);
      throw err; // let callers (e.g. the comment saver) know it didn't persist
    }
    if(!c.weeks) c.weeks={};
    c.weeks[key]=merged; // keep local copy fresh
  }

  async function renderStudentAfterReload(studentId){
    cons=await DB.list("consultations", S.activeSem?{semesterId:S.activeSem}:{});
    drawCards();               // keep the status chips on the picker cards fresh
    renderStudent(studentId);
  }

  drawCards();
